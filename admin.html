<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineRewards Master | Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #09090b; --bg-panel: #18181b; --border-color: #27272a; --text-main: #f8fafc; --text-muted: #94a3b8; --accent-gold: #fbbf24; --accent-gold-hover: #f59e0b; --success: #10b981; --danger: #ef4444; --info: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; }
        .navbar { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 20px; font-weight: 800; color: var(--accent-gold); }
        .container { padding: 24px; max-width: 1400px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; }
        .stat-value { font-size: 32px; font-weight: 800; }
        .panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; margin-bottom: 24px; }
        .panel-header { padding: 20px; border-bottom: 1px solid var(--border-color); font-weight: 700; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.2); padding: 16px; text-align: left; font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .btn-action { width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer; margin-right: 5px; }
        .btn-add { background: rgba(59, 130, 246, 0.1); color: var(--info); border: 1px solid rgba(59, 130, 246, 0.2); }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        #sys-message { padding: 15px; margin-bottom: 20px; border-radius: 12px; display: none; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="brand">CineRewards Master</div></nav>
    <div class="container">
        <div id="sys-message"></div>
        <div class="stats-grid">
            <div class="stat-card"><div>Total Usuários</div><div class="stat-value" id="valUsers">0</div></div>
            <div class="stat-card"><div>Total Pontos</div><div class="stat-value" id="valPoints">0</div></div>
            <div class="stat-card"><div>Saques Pendentes</div><div class="stat-value" id="valPending">0</div></div>
        </div>
        <div class="panel">
            <div class="panel-header">Gerenciamento de Contas</div>
            <table>
                <thead><tr><th>E-mail</th><th>Pontos</th><th>Ações</th></tr></thead>
                <tbody id="tbUsuarios"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hvivrmdygytttdlapjbi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjY4Nzg0MywiZXhwIjoyMDk4MjYzODQzfQ.k5ofLY9j4N_INM0hg7poKKP6dq8FRG3qHntKoiFW83g';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarDados() {
            try {
                const { data: perfis } = await db.from('perfis').select('*');
                const { data: saques } = await db.from('saques').select('*');
                
                document.getElementById('valUsers').innerText = perfis ? perfis.length : 0;
                document.getElementById('valPoints').innerText = perfis ? perfis.reduce((a, b) => a + (parseInt(b.pontos) || 0), 0).toLocaleString() : 0;
                document.getElementById('valPending').innerText = saques ? saques.filter(s => s.status === 'pendente').length : 0;
                
                const tbody = document.getElementById('tbUsuarios');
                tbody.innerHTML = '';
                perfis.forEach(u => {
                    tbody.innerHTML += `<tr>
                        <td>${u.email}</td>
                        <td>${(u.pontos || 0).toLocaleString()}</td>
                        <td>
                            <button class="btn-action btn-add" onclick="editPontos('${u.id}', ${u.pontos || 0})"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-action btn-del" onclick="deletar('${u.id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
            } catch (e) { console.error(e); }
        }

        async function editPontos(id, atual) {
            const novo = prompt("Digite o novo saldo de pontos:", atual);
            if(novo !== null) {
                const { error } = await db.from('perfis').update({ pontos: parseInt(novo) }).eq('id', id);
                if(error) alert("Erro: " + error.message);
                else alert("Saldo atualizado!");
            }
        }

        async function deletar(id) {
            if(confirm("Excluir usuário?")) {
                await db.from('perfis').delete().eq('id', id);
            }
        }

        // Configuração de Tempo Real
        db.channel('public:perfis')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'perfis' }, () => carregarDados())
          .subscribe();

        window.onload = carregarDados;
    </script>
</body>
</html>
