<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CineRewards | Painel Master</title>
</head>
<body class="bg-black text-white min-h-screen p-4">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-black text-amber-500 mb-6">👑 PAINEL MASTER CONTROL</h1>

        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="renderizar('perfis')" class="bg-blue-600 px-4 py-2 rounded font-bold text-sm hover:bg-blue-500">Usuários</button>
            <button onclick="renderizar('videos_virais')" class="bg-purple-600 px-4 py-2 rounded font-bold text-sm hover:bg-purple-500">Filmes</button>
            <button onclick="renderizar('saques')" class="bg-emerald-600 px-4 py-2 rounded font-bold text-sm hover:bg-emerald-500">Saques</button>
        </div>

        <div id="content" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 min-h-[400px]">
            <p class="text-zinc-500 text-center mt-20">Selecione uma categoria acima para carregar as ferramentas.</p>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO CORRETA (Baseada nas suas telas do Supabase)
        const SUPABASE_URL = 'https://hvivrmdygytttdlapjbi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6Imhub24iLCJpYXQiOjE3ODI2ODc4NDMsImV4cCI6MjA5ODI2Mzg0M30.7tEyMfCreAwn7e2zikqWtdErjEHCL-la4-RzPxN1Twg';
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function renderizar(tabela) {
            const content = document.getElementById('content');
            content.innerHTML = '<p class="text-center">Carregando...</p>';

            const { data, error } = await db.from(tabela).select('*');
            
            if (error) {
                content.innerHTML = `<p class="text-red-500">Erro: ${error.message}</p>`;
                return;
            }

            content.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold uppercase tracking-wider">${tabela}</h2>
                    <button onclick="addNovo('${tabela}')" class="bg-green-600 px-4 py-2 rounded text-xs font-bold">+ NOVO ITEM</button>
                </div>
                <div class="grid gap-3">
                    ${data.map(item => `
                        <div class="flex justify-between items-center bg-zinc-800 p-4 rounded-lg border border-zinc-700">
                            <span class="text-sm font-medium truncate w-1/2">${item.email || item.titulo || 'ID: '+item.id}</span>
                            <div class="flex gap-2">
                                <button onclick="editarItem('${tabela}', '${item.id}')" class="bg-zinc-700 px-3 py-1 rounded text-[10px] text-blue-300">EDITAR</button>
                                <button onclick="deletarItem('${tabela}', '${item.id}')" class="bg-zinc-700 px-3 py-1 rounded text-[10px] text-red-300">EXCLUIR</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function editarItem(tabela, id) {
            const campo = prompt("Qual campo deseja editar? (ex: saldo, pontos, status, titulo)");
            const novoValor = prompt("Digite o novo valor:");
            if (campo && novoValor) {
                const { error } = await db.from(tabela).update({ [campo]: novoValor }).eq('id', id);
                if (error) alert("Erro ao editar: " + error.message);
                else renderizar(tabela);
            }
        }

        async function deletarItem(tabela, id) {
            if (confirm("Deseja realmente excluir este item?")) {
                await db.from(tabela).delete().eq('id', id);
                renderizar(tabela);
            }
        }

        async function addNovo(tabela) {
            const nome = prompt("Nome, Email ou Título:");
            if (nome) {
                const obj = (tabela === 'videos_virais') ? { titulo: nome } : { email: nome };
                await db.from(tabela).insert(obj);
                renderizar(tabela);
            }
        }
    </script>
</body>
</html>
