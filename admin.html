<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0e; color: #fff; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #333; text-align: left; }
        .btn { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Painel de Administração</h1>
    <div id="painel" style="display:none;">
        <table>
            <thead><tr><th>E-mail</th><th>Saldo</th><th>Ações</th></tr></thead>
            <tbody id="tabelaUsuarios"></tbody>
        </table>
    </div>

    <script>
        const supabase = supabase.createClient('https://hvivrmdygytttdlapjbi.supabase.co/rest/v1/', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjY4Nzg0MywiZXhwIjoyMDk4MjYzODQzfQ.k5ofLY9j4N_INM0hg7poKKP6dq8FRG3qHntKoiFW83g');

        async function verificarAdmin() {
            const { data: { user } } = await supabase.auth.getUser();
            // SUBSTITUA ABAIXO PELO SEU E-MAIL
            if (!user || user.email !== 'nandoporto41@gmail.com') {
                alert("Acesso Negado!");
                window.location.href = 'index.html';
            } else {
                document.getElementById('painel').style.display = 'block';
                carregarUsuarios();
            }
        }

        async function carregarUsuarios() {
            const { data } = await supabase.from('perfis').select('*');
            const tbody = document.getElementById('tabelaUsuarios');
            tbody.innerHTML = data.map(u => `
                <tr>
                    <td>${u.email}</td>
                    <td>R$ ${u.saldo_reais}</td>
                    <td><button class="btn" onclick="addSaldo('${u.id}')">Add $</button></td>
                </tr>
            `).join('');
        }

        async function addSaldo(id) {
            const valor = prompt("Quanto adicionar?");
            if (valor) {
                await supabase.from('perfis').update({ saldo_reais: valor }).eq('id', id);
                carregarUsuarios();
            }
        }

        window.onload = verificarAdmin;
    </script>
</body>
</html>
