<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineWorld | Master Admin Panel V2</title>

    <!-- Bibliotecas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { background-color: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        @media (max-width: 768px) { body { flex-direction: column; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        .glass { background: #0a0a0f; border: 1px solid #1f1f2e; border-radius: 12px; }
        
        /* Navegação Garantida */
        .nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 14px; color: #8e8e93; font-weight: 600; border-radius: 10px; transition: 0.2s; cursor: pointer; text-align: left; }
        .nav-btn:hover { background: #18181b; color: #fff; }
        .nav-btn.active { background: rgba(99, 102, 241, 0.1); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.2); }

        /* Abas Escondidas/Visíveis */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- MENU LATERAL -->
    <nav class="bg-[#08080c] border-b md:border-r border-[#1f1f2e] w-full md:w-64 p-4 flex flex-row md:flex-col shrink-0 overflow-x-auto z-50">
        <div class="hidden md:block mb-8 mt-2 px-2">
            <h1 class="text-2xl font-black text-indigo-500">CineWorld<span class="text-white">PRO</span></h1>
            <p class="text-xs text-emerald-500 mt-1">● Sistema Ativo</p>
        </div>
        
        <!-- Usando onclick direto no HTML garante que o clique funcione sempre -->
        <div class="flex flex-row md:flex-col gap-2 w-max md:w-full">
            <button onclick="mudarAba('dashboard')" id="btn-dashboard" class="nav-btn active"><i class="fa-solid fa-chart-pie w-5"></i> Dashboard</button>
            <button onclick="mudarAba('usuarios')" id="btn-usuarios" class="nav-btn"><i class="fa-solid fa-users w-5"></i> Usuários</button>
            <button onclick="mudarAba('saques')" id="btn-saques" class="nav-btn"><i class="fa-solid fa-money-bill-transfer w-5"></i> Saques (PIX)</button>
            <button onclick="mudarAba('filmes')" id="btn-filmes" class="nav-btn"><i class="fa-solid fa-clapperboard w-5"></i> Controle de Hits</button>
            <button onclick="mudarAba('config')" id="btn-config" class="nav-btn"><i class="fa-solid fa-gear w-5"></i> Setup</button>
        </div>
    </nav>

    <!-- ÁREA PRINCIPAL -->
    <main class="flex-1 p-4 md:p-8 overflow-y-auto relative">
        
        <!-- CAIXA DE DEBUG (Muito importante para descobrirmos erros) -->
        <div id="debug-box" class="hidden mb-6 bg-red-900/30 border border-red-500 p-4 rounded-xl">
            <h3 class="text-red-400 font-bold text-sm uppercase"><i class="fa-solid fa-bug"></i> Log de Erro do Supabase</h3>
            <p id="debug-text" class="text-xs text-red-200 mt-2 font-mono break-words"></p>
            <button onclick="document.getElementById('debug-box').classList.add('hidden')" class="mt-3 text-xs bg-red-500/20 px-3 py-1 rounded text-red-300">Fechar Aviso</button>
        </div>

        <!-- ABA: DASHBOARD -->
        <div id="tab-dashboard" class="tab-content active max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
                <h2 class="text-2xl font-black text-white">Monitoramento Global</h2>
                <button onclick="carregarDashboard()" class="text-indigo-400 text-sm font-bold bg-indigo-500/10 px-4 py-2 rounded-lg hover:bg-indigo-500/20"><i class="fa-solid fa-rotate"></i> Atualizar</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="glass p-5">
                    <p class="text-zinc-500 text-[10px] font-bold uppercase mb-1">Total de Usuários</p>
                    <p class="text-3xl font-black text-white" id="m-users"><i class="fa-solid fa-ellipsis"></i></p>
                </div>
                <div class="glass p-5 border-amber-500/30 border">
                    <p class="text-amber-500 text-[10px] font-bold uppercase mb-1">Saques Pendentes</p>
                    <p class="text-3xl font-black text-amber-400" id="m-pendentes"><i class="fa-solid fa-ellipsis"></i></p>
                </div>
                <div class="glass p-5">
                    <p class="text-zinc-500 text-[10px] font-bold uppercase mb-1">Saques Pagos</p>
                    <p class="text-3xl font-black text-emerald-400" id="m-pagos"><i class="fa-solid fa-ellipsis"></i></p>
                </div>
                <div class="glass p-5">
                    <p class="text-zinc-500 text-[10px] font-bold uppercase mb-1">Vídeos / Hits</p>
                    <p class="text-3xl font-black text-indigo-400" id="m-filmes"><i class="fa-solid fa-ellipsis"></i></p>
                </div>
            </div>

            <div class="glass p-6">
                <h3 class="font-bold text-white mb-4">Últimos Cadastros</h3>
                <div id="lista-ultimos-users" class="space-y-2 text-sm text-zinc-400">
                    <p>Puxando dados...</p>
                </div>
            </div>
        </div>

        <!-- ABA: USUÁRIOS -->
        <div id="tab-usuarios" class="tab-content max-w-6xl mx-auto">
            <h2 class="text-2xl font-black text-white mb-6 border-b border-zinc-800 pb-4">Gestão de Usuários</h2>
            <div id="conteudo-usuarios" class="grid gap-3"></div>
        </div>

        <!-- ABA: SAQUES -->
        <div id="tab-saques" class="tab-content max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
                <h2 class="text-2xl font-black text-white">Auditoria de Saques</h2>
                <select id="filtro-saque" onchange="carregarSaques()" class="bg-[#18181b] border border-zinc-700 text-white rounded p-2 text-sm outline-none">
                    <option value="Pendente">Pendentes</option>
                    <option value="Aprovado">Aprovados</option>
                    <option value="Recusado">Recusados</option>
                </select>
            </div>
            <div id="conteudo-saques" class="grid gap-4"></div>
        </div>

        <!-- ABA: FILMES -->
        <div id="tab-filmes" class="tab-content max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
                <h2 class="text-2xl font-black text-white">Controle de Hits</h2>
                <button onclick="adicionarFilme()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded-lg text-sm transition shadow-lg"><i class="fa-solid fa-plus"></i> Novo Hit</button>
            </div>
            <div id="conteudo-filmes" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- ABA: CONFIG -->
        <div id="tab-config" class="tab-content max-w-3xl mx-auto">
            <h2 class="text-2xl font-black text-white mb-6 border-b border-zinc-800 pb-4">Setup Geral</h2>
            <div id="conteudo-config" class="glass p-6 md:p-8"></div>
        </div>

    </main>

    <!-- JAVASCRIPT BLINDADO -->
    <script>
        // --- 1. CREDENCIAIS ---
        const URL_SUPA = 'https://hvivrmdygytttdlapjbi.supabase.co';
        const KEY_SUPA = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODc4NDMsImV4cCI6MjA5ODI2Mzg0M30.7tEyMfCreAwn7e2zikqWtdErjEHCL-la4-RzPxN1Twg';
        const supabase = window.supabase.createClient(URL_SUPA, KEY_SUPA);

        // --- 2. SISTEMA DE NAVEGAÇÃO GARANTIDO ---
        function mudarAba(idAba) {
            // Esconde todas as abas e botões
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Ativa a aba atual
            document.getElementById(`tab-${idAba}`).classList.add('active');
            document.getElementById(`btn-${idAba}`).classList.add('active');
            
            // Oculta caixa de erro ao trocar de aba
            document.getElementById('debug-box').classList.add('hidden');

            // Dispara o carregamento de dados apropriado
            if(idAba === 'dashboard') carregarDashboard();
            if(idAba === 'usuarios') carregarUsuarios();
            if(idAba === 'saques') carregarSaques();
            if(idAba === 'filmes') carregarFilmes();
            if(idAba === 'config') carregarConfig();
        }

        // Sistema de relatórios de erros visível
        function mostrarErro(contexto, erro) {
            console.error(`Erro em ${contexto}:`, erro);
            document.getElementById('debug-box').classList.remove('hidden');
            document.getElementById('debug-text').innerText = `[${contexto}] -> ${erro.message || JSON.stringify(erro)}`;
        }

        // Formatação de Dinheiro
        const fMoney = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);

        // --- 3. DASHBOARD ---
        async function carregarDashboard() {
            try {
                // Buscas simples, isoladas, para evitar que uma quebre a outra
                const u = await supabase.from('perfis_premium').select('id', { count: 'exact', head: true });
                const sPend = await supabase.from('solicitacoes_saque').select('id', { count: 'exact', head: true }).eq('status', 'Pendente');
                const sPago = await supabase.from('solicitacoes_saque').select('id', { count: 'exact', head: true }).eq('status', 'Aprovado');
                const f = await supabase.from('filmes').select('id', { count: 'exact', head: true });
                const ultimos = await supabase.from('perfis_premium').select('email, saldo').order('created_at', { ascending: false }).limit(4);

                document.getElementById('m-users').innerText = u.count || 0;
                document.getElementById('m-pendentes').innerText = sPend.count || 0;
                document.getElementById('m-pagos').innerText = sPago.count || 0;
                document.getElementById('m-filmes').innerText = f.count || 0;

                const divUsers = document.getElementById('lista-ultimos-users');
                if (ultimos.data && ultimos.data.length > 0) {
                    divUsers.innerHTML = ultimos.data.map(x => `
                        <div class="flex justify-between items-center border-b border-zinc-800/50 pb-2 mb-2">
                            <span class="text-white">${x.email}</span>
                            <span class="text-emerald-500 font-bold">${fMoney(x.saldo)}</span>
                        </div>
                    `).join('');
                } else {
                    divUsers.innerHTML = "Nenhum usuário cadastrado.";
                }
            } catch (err) {
                mostrarErro('Dashboard', err);
            }
        }

        // --- 4. USUÁRIOS ---
        async function carregarUsuarios() {
            const div = document.getElementById('conteudo-usuarios');
            div.innerHTML = '<div class="loader"></div>';

            try {
                const { data, error } = await supabase.from('perfis_premium').select('*').order('created_at', { ascending: false }).limit(50);
                if (error) throw error;
                if (!data || data.length === 0) { div.innerHTML = '<p class="text-zinc-500">Nenhum usuário no banco de dados.</p>'; return; }

                div.innerHTML = data.map(u => `
                    <div class="glass p-4 flex flex-col md:flex-row justify-between items-center gap-4 hover:bg-[#0f0f15] transition">
                        <div class="w-full">
                            <h3 class="font-bold text-white text-lg">${u.email || 'Usuário Sem Email'}</h3>
                            <div class="flex gap-4 text-xs mt-2 font-mono">
                                <span class="bg-[#18181b] px-2 py-1 rounded border border-zinc-800"><span class="text-zinc-500">Saldo:</span> <span class="text-emerald-400">${fMoney(u.saldo)}</span></span>
                                <span class="bg-[#18181b] px-2 py-1 rounded border border-zinc-800"><span class="text-zinc-500">Pts:</span> <span class="text-amber-400">${u.pontos || 0}</span></span>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button onclick="editarCampo('${u.id}', 'pontos', ${u.pontos || 0})" class="flex-1 bg-amber-500/10 text-amber-500 border border-amber-500/20 px-3 py-2 rounded text-xs font-bold hover:bg-amber-500 hover:text-black transition">Edit Pts</button>
                            <button onclick="editarCampo('${u.id}', 'saldo', ${u.saldo || 0})" class="flex-1 bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 px-3 py-2 rounded text-xs font-bold hover:bg-emerald-500 hover:text-black transition">Edit $</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                div.innerHTML = '<p class="text-red-500">Falha ao carregar.</p>';
                mostrarErro('Usuários', err);
            }
        }

        window.editarCampo = async function(id, campo, valorAtual) {
            const { value } = await Swal.fire({
                title: `Novo valor de ${campo}`,
                input: 'number',
                inputAttributes: { step: campo === 'saldo' ? '0.01' : '1' },
                inputValue: valorAtual,
                showCancelButton: true, background: '#121214', color: '#fff'
            });

            if (value !== undefined && value !== "") {
                try {
                    let obj = {}; obj[campo] = (campo === 'saldo') ? parseFloat(value) : parseInt(value);
                    const { error } = await supabase.from('perfis_premium').update(obj).eq('id', id);
                    if (error) throw error;
                    Swal.fire({icon: 'success', title: 'Salvo!', timer: 1000, background: '#121214', color: '#fff'});
                    carregarUsuarios();
                } catch(e) { mostrarErro('Edição User', e); }
            }
        }

        // --- 5. SAQUES (COM MAPEAMENTO MANUAL ANTI-CRASH) ---
        async function carregarSaques() {
            const div = document.getElementById('conteudo-saques');
            const statusFiltro = document.getElementById('filtro-saque').value;
            div.innerHTML = '<div class="loader"></div>';

            try {
                // Passo 1: Busca os saques sem Foreign Key Join para evitar crash do Supabase
                const { data: saques, error: e1 } = await supabase.from('solicitacoes_saque').select('*').eq('status', statusFiltro).order('created_at', { ascending: false });
                if (e1) throw e1;

                if (!saques || saques.length === 0) { div.innerHTML = `<p class="text-zinc-500 p-4">Nenhum saque ${statusFiltro}.</p>`; return; }

                // Passo 2: Busca os e-mails separadamente e faz o "match" via Javascript
                const { data: users, error: e2 } = await supabase.from('perfis_premium').select('id, email');
                if (e2) throw e2;
                
                // Cria um dicionário para achar o email rápido
                const userMap = {};
                if(users) users.forEach(u => userMap[u.id] = u.email);

                div.innerHTML = saques.map(s => {
                    const email = userMap[s.perfil_id] || `ID: ${s.perfil_id}`;
                    let botoes = '';
                    
                    if (s.status === 'Pendente') {
                        botoes = `
                            <button onclick="mudarStatusSaque('${s.id}', 'Aprovado')" class="bg-emerald-600 text-white px-4 py-2 rounded text-sm font-bold w-full mb-2">Marcar Pago</button>
                            <button onclick="mudarStatusSaque('${s.id}', 'Recusado')" class="border border-red-500/50 text-red-400 hover:bg-red-900/30 px-4 py-2 rounded text-sm font-bold w-full">Recusar</button>
                        `;
                    }

                    return `
                    <div class="glass p-5 border-l-4 ${s.status === 'Pendente' ? 'border-amber-500' : 'border-zinc-700'} flex flex-col md:flex-row gap-4">
                        <div class="flex-1">
                            <p class="text-zinc-500 text-xs mb-1">ID Saque: ${s.id}</p>
                            <h3 class="font-bold text-white text-lg">${email}</h3>
                            <p class="text-2xl font-black text-emerald-400 my-2">${fMoney(s.valor)}</p>
                            <div class="bg-[#050505] border border-zinc-800 p-2 rounded inline-block">
                                <p class="text-[10px] text-zinc-500">CHAVE PIX (Copie)</p>
                                <p class="font-mono text-white select-all">${s.chave_pix}</p>
                            </div>
                        </div>
                        <div class="w-full md:w-40 flex flex-col justify-center">
                            ${botoes}
                        </div>
                    </div>
                `}).join('');
            } catch (err) {
                div.innerHTML = '<p class="text-red-500">Falha ao carregar.</p>';
                mostrarErro('Saques', err);
            }
        }

        window.mudarStatusSaque = async function(id, status) {
            let motivo = null;
            if(status === 'Recusado') {
                const res = await Swal.fire({ title: 'Motivo', input: 'text', showCancelButton: true, background: '#121214', color: '#fff' });
                if(!res.isConfirmed) return;
                motivo = res.value;
            }
            try {
                const { error } = await supabase.from('solicitacoes_saque').update({ status, motivo_recusa: motivo }).eq('id', id);
                if(error) throw error;
                Swal.fire({icon: 'success', title: 'Atualizado!', timer: 1000, background: '#121214', color: '#fff'});
                carregarSaques();
            } catch(e) { mostrarErro('Update Saque', e); }
        }

        // --- 6. FILMES / HITS ---
        async function carregarFilmes() {
            const div = document.getElementById('conteudo-filmes');
            div.innerHTML = '<div class="loader"></div>';
            try {
                const { data, error } = await supabase.from('filmes').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                if (!data || data.length === 0) { div.innerHTML = '<p class="text-zinc-500">Nenhum hit cadastrado.</p>'; return; }

                div.innerHTML = data.map(f => `
                    <div class="glass p-4">
                        <h3 class="font-bold text-white">${f.titulo}</h3>
                        <p class="text-zinc-500 text-xs my-1 font-mono">ID YT: ${f.url_video}</p>
                        <p class="text-amber-400 font-bold text-sm mb-4">+${f.pontos_por_minuto || 0} PTS por minuto</p>
                        <button onclick="deletarFilme('${f.id}')" class="text-red-400 border border-red-500/30 hover:bg-red-900/30 w-full py-2 rounded text-sm font-bold transition">Remover</button>
                    </div>
                `).join('');
            } catch(err) { mostrarErro('Filmes', err); }
        }

        window.adicionarFilme = async function() {
            const { value: form } = await Swal.fire({
                title: 'Novo Hit',
                html: `
                    <input id="f-titulo" class="swal2-input !w-full !m-0 !mb-3" placeholder="Título da Música">
                    <input id="f-url" class="swal2-input !w-full !m-0 !mb-3" placeholder="ID YouTube (Ex: dQw4w9WgXcQ)">
                    <input id="f-pts" type="number" class="swal2-input !w-full !m-0" placeholder="Pontos por minuto">
                `,
                background: '#121214', color: '#fff', focusConfirm: false, showCancelButton: true,
                preConfirm: () => {
                    const titulo = document.getElementById('f-titulo').value;
                    const url = document.getElementById('f-url').value;
                    const pts = document.getElementById('f-pts').value;
                    if(!titulo || !url) { Swal.showValidationMessage('Preencha os campos!'); return false; }
                    return { titulo, url_video: url, pontos_por_minuto: parseInt(pts) || 100 };
                }
            });
            if(form) {
                try {
                    const { error } = await supabase.from('filmes').insert(form);
                    if(error) throw error;
                    Swal.fire({icon: 'success', title: 'Salvo!', timer: 1000, background: '#121214', color: '#fff'});
                    carregarFilmes();
                } catch(e) { mostrarErro('Adicionar Filme', e); }
            }
        }

        window.deletarFilme = async function(id) {
            try {
                await supabase.from('filmes').delete().eq('id', id);
                carregarFilmes();
            } catch(e) { mostrarErro('Deletar Filme', e); }
        }

        // --- 7. CONFIGURAÇÕES ---
        async function carregarConfig() {
            const div = document.getElementById('conteudo-config');
            div.innerHTML = '<div class="loader"></div>';
            try {
                const { data, error } = await supabase.from('configuracoes').select('*').limit(1);
                if (error) throw error;
                const c = (data && data.length > 0) ? data[0] : { id: 1, min_saque: 20, min_indicacoes: 5 };

                div.innerHTML = `
                    <div class="mb-4">
                        <label class="text-xs font-bold text-zinc-500 uppercase">Saque Mínimo (R$)</label>
                        <input type="number" id="c-saque" value="${c.min_saque}" class="w-full bg-[#18181b] border border-zinc-700 p-3 rounded text-white mt-1">
                    </div>
                    <div class="mb-6">
                        <label class="text-xs font-bold text-zinc-500 uppercase">Mínimo Indicações</label>
                        <input type="number" id="c-indica" value="${c.min_indicacoes}" class="w-full bg-[#18181b] border border-zinc-700 p-3 rounded text-white mt-1">
                    </div>
                    <button onclick="salvarConfig(${c.id})" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-lg hover:bg-indigo-500 transition">Salvar Alterações</button>
                `;
            } catch(err) { mostrarErro('Config', err); }
        }

        window.salvarConfig = async function(id) {
            const s = parseFloat(document.getElementById('c-saque').value);
            const i = parseInt(document.getElementById('c-indica').value);
            try {
                const { error } = await supabase.from('configuracoes').upsert({ id, min_saque: s, min_indicacoes: i });
                if(error) throw error;
                Swal.fire({icon: 'success', title: 'Salvo!', timer: 1000, background: '#121214', color: '#fff'});
            } catch(e) { mostrarErro('Salvar Config', e); }
        }

        // Inicia na Dashboard
        window.onload = () => mudarAba('dashboard');

    </script>
</body>
</html>
