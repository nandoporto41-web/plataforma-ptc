<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CineRewards | Admin Control</title>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
            <h1 class="text-xl font-black text-amber-500">👑 PAINEL MASTER</h1>
            <button onclick="location.reload()" class="bg-zinc-800 px-3 py-1 rounded text-xs">Atualizar Dados</button>
        </header>

        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="gerenciar('perfis')" class="bg-blue-600 px-4 py-2 rounded font-bold text-sm">Usuários</button>
            <button onclick="gerenciar('videos_virais')" class="bg-purple-600 px-4 py-2 rounded font-bold text-sm">Filmes</button>
            <button onclick="gerenciar('saques')" class="bg-emerald-600 px-4 py-2 rounded font-bold text-sm">Saques</button>
        </div>

        <div id="content" class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 min-h-[400px]">
            <p class="text-zinc-500 text-center mt-20">Selecione uma categoria acima para carregar as ferramentas de edição.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hvivrmdygytttdlapjbi.supabase.co';
        const SUPABASE_KEY = 'SUA_CHAVE_ANON_AQUI'; // <--- COLE A CHAVE ANON AQUI
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function gerenciar(tabela) {
            const content = document.getElementById('content');
            content.innerHTML = '<p>Carregando dados...</p>';

            const { data, error } = await db.from(tabela).select('*');
            if(error) { content.innerHTML = `<p class="text-red-500">Erro: ${error.message}</p>`; return; }

            content.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold capitalize">${tabela}</h2>
                    <button onclick="addNovo('${tabela}')" class="bg-green-600 px-3 py-1 rounded text-xs">+ Adicionar Novo</button>
                </div>
                <div class="space-y-2">
                    ${data.map(i => `
                        <div class="flex justify-between items-center bg-zinc-800 p-3 rounded border border-zinc-700">
                            <div class="text-sm">
                                <p class="font-bold">${i.email || i.titulo || 'ID: '+i.id}</p>
                                <p class="text-zinc-400 text-[10px]">ID: ${i.id.substring(0,8)}...</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editarItem('${tabela}', '${i.id}')" class="text-blue-400 text-xs">EDITAR</button>
                                <button onclick="deletarItem('${tabela}', '${i.id}')" class="text-red-400 text-xs">DEL</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function editarItem(tabela, id) {
            const campo = prompt("Qual coluna deseja editar?");
            const valor = prompt("Qual o novo valor?");
            if(campo && valor) {
                await db.from(tabela).update({ [campo]: valor }).eq('id', id);
                gerenciar(tabela);
            }
        }

        async function deletarItem(tabela, id) {
            if(confirm("Confirmar exclusão?")) {
                await db.from(tabela).delete().eq('id', id);
                gerenciar(tabela);
            }
        }

        async function addNovo(tabela) {
            const nome = prompt("Nome, Email ou Título:");
            if(nome) {
                const dados = (tabela === 'videos_virais') ? { titulo: nome } : { email: nome };
                await db.from(tabela).insert(dados);
                gerenciar(tabela);
            }
        }
    </script>
</body>
</html>
