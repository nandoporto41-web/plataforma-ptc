<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineRewards Pro - Painel Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #0a0a0e; color: #e2e8f0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Topbar adaptada para Mobile/Desktop */
        .topbar { background: #111116; border-bottom: 1px solid #1f1f2e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .topbar h2 { color: #ff9d00; font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        
        .main-content { flex: 1; padding: 15px; overflow-x: hidden; }
        
        #status-global { background: rgba(245, 158, 11, 0.1); border: 1px solid #f59e0b; color: #f59e0b; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; text-align: center; font-size: 13px; }

        /* Grid de cards corrigido para caber no telemóvel */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #111116; border: 1px solid #1f1f2e; padding: 15px; border-radius: 12px; }
        .stat-card p { color: #94a3b8; font-size: 11px; text-transform: uppercase; }
        .stat-card h3 { font-size: 20px; color: #fff; margin-top: 5px; font-weight: 600; }

        /* Ferramentas do Sistema profissional */
        .tools-section { background: #111116; border: 1px solid #1f1f2e; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .search-box { width: 100%; background: #1f1f2e; border: 1px solid #333; padding: 10px; border-radius: 8px; color: #fff; font-size: 14px; }

        /* Containers de tabelas com scroll horizontal para não quebrar no telemóvel */
        .table-container { background: #111116; border: 1px solid #1f1f2e; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .table-container h3 { margin-bottom: 12px; font-size: 14px; color: #ff9d00; display: flex; align-items: center; gap: 8px; }
        .responsive-table { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; min-width: 500px; }
        th { padding: 10px; color: #94a3b8; border-bottom: 2px solid #1f1f2e; background: #111116; }
        td { padding: 10px; border-bottom: 1px solid #1f1f2e; color: #cbd5e1; }
        
        /* Botões operacionais em lista */
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn { padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .btn-success { background: #10b981; color: #000; }
        .btn-danger { background: #ef4444; color: #fff; }
        
        .badge-suspect { background: rgba(239, 68, 68, 0.15); color: #ef4444; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-normal { background: rgba(16, 185, 129, 0.15); color: #10b981; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>

    <div class="topbar">
        <h2><i class="fa-solid fa-clapperboard"></i> CineRewards Admin</h2>
        <span style="font-size: 11px; color: #94a3b8;"><i class="fa-solid fa-circle text-success" style="color:#10b981;"></i> Modo Online</span>
    </div>

    <div class="main-content">
        <div id="status-global">Verificando credenciais de administrador...</div>

        <div id="conteudo-painel" style="display: none;">
            <!-- Indicadores Rápidos -->
            <div class="stats-grid">
                <div class="stat-card">
                    <p>Usuários</p>
                    <h3 id="totalUsers">0</h3>
                </div>
                <div class="stat-card">
                    <p>Pendentes</p>
                    <h3 id="pendingWithdraws" style="color: #f59e0b;">0</h3>
                </div>
                <div class="stat-card">
                    <p>Total Pago</p>
                    <h3 id="totalPaid" style="color: #10b981;">R$ 0,00</h3>
                </div>
            </div>

            <!-- Caixa de Busca Operacional -->
            <div class="tools-section">
                <input type="text" id="inputBusca" class="search-box" placeholder="🔍 Buscar usuário por e-mail..." oninput="filtrarUsuarios()">
            </div>

            <!-- Tabela de Saques -->
            <div class="table-container">
                <h3><i class="fa-solid fa-money-bill-wave"></i> Saques Pendentes</h3>
                <div class="responsive-table">
                    <table>
                        <thead>
                            <tr>
                                <th>E-mail</th>
                                <th>Chave Pix</th>
                                <th>Valor</th>
                                <th>Antifraude</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="saquesTableBody">
                            <tr><td colspan="5" style="text-align:center;">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Tabela de Usuários -->
            <div class="table-container">
                <h3><i class="fa-solid fa-users-gear"></i> Gerenciar Usuários</h3>
                <div class="responsive-table">
                    <table>
                        <thead>
                            <tr>
                                <th>E-mail</th>
                                <th>Pontos</th>
                                <th>Saldo</th>
                                <th>Assistiu Vídeo?</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="usuariosTableBody">
                            <tr><td colspan="5" style="text-align:center;">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hvivrmdygytttdlapjbi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjY4Nzg0MywiZXhwIjoyMDk4MjYzODQzfQ.k5ofLY9j4N_INM0hg7poKKP6dq8FRG3qHntKoiFW83g';
        
        const _adminSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let listaPerfisLocal = [];

        async function verificarAcessoAdmin() {
            try {
                const { data: { user }, error: authError } = await _adminSupabase.auth.getUser();
                if (authError || !user || user.email !== 'nandoporto41@gmail.com') {
                    exibirErroGlobal("Acesso estritamente negado.");
                } else {
                    document.getElementById('status-global').style.display = 'none';
                    document.getElementById('conteudo-painel').style.display = 'block';
                    carregarDadosDashboard();
                }
            } catch (err) {
                exibirErroGlobal("Erro de inicialização: " + err.message);
            }
        }

        function exibirErroGlobal(m) {
            const el = document.getElementById('status-global');
            el.style.background = "rgba(239, 68, 68, 0.1)";
            el.style.border = "1px solid #ef4444";
            el.style.color = "#ef4444";
            el.innerText = m;
        }

        async function carregarDadosDashboard() {
            const { data: perfis } = await _adminSupabase.from('perfis').select('*');
            let { data: saques } = await _adminSupabase.from('saques').select('*');
            if (!saques) saques = [];
            
            listaPerfisLocal = perfis || [];

            document.getElementById('totalUsers').innerText = listaPerfisLocal.length;
            const pendentes = saques.filter(s => s.status === 'pendente');
            document.getElementById('pendingWithdraws').innerText = pendentes.length;
            
            const totalPago = saques.filter(s => s.status === 'pago').reduce((a, c) => a + parseFloat(c.valor), 0);
            document.getElementById('totalPaid').innerText = `R$ ${totalPago.toFixed(2)}`;

            // Renderizar Saques
            const sBody = document.getElementById('saquesTableBody');
            sBody.innerHTML = '';
            if(pendentes.length === 0) {
                sBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;">Nenhum saque pendente.</td></tr>';
            } else {
                pendentes.forEach(s => {
                    let userRef = listaPerfisLocal.find(p => p.id === s.usuario_id);
                    let analise = (userRef && !userRef.primeiro_video_assistido) ? `<span class="badge-suspect">Suspeito</span>` : `<span class="badge-normal">OK</span>`;
                    sBody.innerHTML += `
                        <tr>
                            <td>${s.email}</td>
                            <td>${s.chave_pix}</td>
                            <td style="color:#10b981;">R$ ${parseFloat(s.valor).toFixed(2)}</td>
                            <td>${analise}</td>
                            <td>
                                <div class="btn-group">
                                    <button class="btn btn-success" onclick="processarSaque(${s.id}, 'pago')">✔</button>
                                    <button class="btn btn-danger" onclick="processarSaque(${s.id}, 'recusado')">✖</button>
                                </div>
                            </td>
                        </tr>`;
                });
            }
            renderizarUsuarios(listaPerfisLocal);
        }

        function renderizarUsuarios(dados) {
            const uBody = document.getElementById('usuariosTableBody');
            uBody.innerHTML = '';
            dados.forEach(p => {
                uBody.innerHTML += `
                    <tr>
                        <td>${p.email}</td>
                        <td>${p.pontos || 0}</td>
                        <td style="color:#10b981;">R$ ${parseFloat(p.saldo_reais || 0).toFixed(2)}</td>
                        <td>${p.primeiro_video_assistido ? 'Sim' : 'Não'}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-success" onclick="modificarSaldoManual('${p.id}', ${p.pontos || 0})"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn btn-danger" onclick="banirUsuario('${p.id}', '${p.email}')"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        function filtrarUsuarios() {
            const busca = document.getElementById('inputBusca').value.toLowerCase();
            const filtrados = listaPerfisLocal.filter(u => u.email.toLowerCase().includes(busca));
            renderizarUsuarios(filtrados);
        }

        async function processarSaque(id, status) {
            if(!confirm("Confirmar alteração do saque?")) return;
            await _adminSupabase.from('saques').update({ status: status }).eq('id', id);
            carregarDadosDashboard();
        }

        async function modificarSaldoManual(id, atual) {
            const valor = prompt(`Adicione pontos (Atual: ${atual}):`);
            if(!valor || isNaN(valor)) return;
            let novo = parseInt(atual) + parseInt(valor);
            await _adminSupabase.from('perfis').update({ pontos: novo, saldo_reais: (novo/100).toFixed(2) }).eq('id', id);
            carregarDadosDashboard();
        }

        async function banirUsuario(id, email) {
            if(!confirm(`Deseja deletar permanentemente ${email}?`)) return;
            await _adminSupabase.from('perfis').delete().eq('id', id);
            carregarDadosDashboard();
        }

        window.onload = verificarAcessoAdmin;
    </script>
</body>
</html>
