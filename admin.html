<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Painel de Controle</title>
</head>
<body class="bg-black text-white p-5">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-amber-500 mb-6">Painel de Gerenciamento</h1>

        <!-- Abas -->
        <div class="flex gap-2 mb-6">
            <button onclick="renderizar('perfis')" class="bg-zinc-800 px-4 py-2 rounded">Usuários</button>
            <button onclick="renderizar('videos_virais')" class="bg-zinc-800 px-4 py-2 rounded">Filmes</button>
            <button onclick="renderizar('saques')" class="bg-zinc-800 px-4 py-2 rounded">Saques</button>
        </div>

        <div id="content" class="bg-zinc-900 p-6 rounded-lg min-h-[300px]">
            <p>Selecione uma aba para carregar os dados.</p>
        </div>
    </div>

    <script>
        // Configuração com dados fornecidos
        const SUPABASE_URL = 'https://hvivrmdygytttdlapjbi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6Imhub24iLCJpYXQiOjE3ODI2ODc4NDMsImV4cCI6MjA5ODI2Mzg0M30.7tEyMfCreAwn7e2zikqWtdErjEHCL-la4-RzPxN1Twg';
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function renderizar(tabela) {
            const { data } = await db.from(tabela).select('*');
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <h2 class="capitalize font-bold mb-4">${tabela}</h2>
                <div class="space-y-2">
                    ${data.map(item => `
                        <div class="flex justify-between bg-zinc-800 p-3 rounded">
                            <span>${item.email || item.titulo || item.id}</span>
                            <div class="flex gap-2">
                                <button onclick="editar('${tabela}', '${item.id}')" class="text-blue-400">Editar</button>
                                <button onclick="excluir('${tabela}', '${item.id}')" class="text-red-400">Excluir</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function editar(tabela, id) {
            const campo = prompt("Nome do campo para editar (ex: saldo, status):");
            const valor = prompt("Novo valor:");
            if (campo && valor) {
                await db.from(tabela).update({ [campo]: valor }).eq('id', id);
                renderizar(tabela);
            }
        }

        async function excluir(tabela, id) {
            if (confirm("Confirmar exclusão?")) {
                await db.from(tabela).delete().eq('id', id);
                renderizar(tabela);
            }
        }
    </script>
</body>
</html>
