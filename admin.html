<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineRewards | Admin Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #0b0c10; color: #e5e7eb; }
        .glass-panel { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.5); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden font-sans">

    <!-- Navegação -->
    <nav class="glass-panel md:w-64 w-full p-4 flex md:flex-col gap-2 shrink-0 border-b md:border-r border-zinc-800">
        <h1 class="text-xl font-black text-white mb-4">CineRewards PRO</h1>
        <button onclick="changeTab('dashboard')" class="nav-btn p-3 rounded-lg bg-purple-600/20 text-purple-400 font-bold text-left">📊 Dashboard</button>
        <button onclick="changeTab('filmes')" class="nav-btn p-3 rounded-lg hover:bg-zinc-800 text-zinc-400 font-bold text-left">🎬 Filmes</button>
        <button onclick="changeTab('saques')" class="nav-btn p-3 rounded-lg hover:bg-zinc-800 text-zinc-400 font-bold text-left">💸 Auditoria</button>
    </nav>

    <!-- Conteúdo -->
    <main class="flex-1 overflow-y-auto p-8">
        <div id="tab-dashboard" class="tab-content active">
            <h2 class="text-2xl font-black mb-6">Visão Geral</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-5 rounded-2xl">
                    <p class="text-zinc-500 text-xs uppercase font-bold">Usuários</p>
                    <p class="text-3xl font-black" id="metric-users">0</p>
                </div>
                <div class="glass-panel p-5 rounded-2xl">
                    <p class="text-zinc-500 text-xs uppercase font-bold">Saques Pendentes</p>
                    <p class="text-3xl font-black text-amber-500" id="metric-saques">0</p>
                </div>
            </div>
        </div>

        <div id="tab-filmes" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Filmes</h2>
            <div id="list-filmes" class="space-y-4">Carregando...</div>
        </div>

        <div id="tab-saques" class="tab-content">
            <h2 class="text-2xl font-black mb-6">Auditoria de Saques</h2>
            <div id="list-saques" class="space-y-4">Carregando...</div>
        </div>
    </main>

    <script>
        const supabase = window.supabase.createClient('https://hvivrmdygytttdlapjbi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwiaWF0IjoxNzgyNjg3ODQzLCJleHAiOjIwOTgyNjM4NDN9.3-33kC_8Z4a9eP4dY_N9e5d6Z0Z6A0Z9X9Z9Z9Z9Z9');

        function changeTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            if(tabId === 'dashboard') loadDashboard();
            if(tabId === 'filmes') loadFilmes();
            if(tabId === 'saques') loadSaques();
        }

        async function loadDashboard() {
            const { count: users } = await supabase.from('perfis_premium').select('*', { count: 'exact', head: true });
            const { count: saques } = await supabase.from('solicitacoes_saque').select('*', { count: 'exact', head: true }).eq('status', 'Pendente');
            document.getElementById('metric-users').innerText = users || 0;
            document.getElementById('metric-saques').innerText = saques || 0;
        }

        async function loadFilmes() {
            const { data } = await supabase.from('filmes').select('*');
            document.getElementById('list-filmes').innerHTML = data.map(f => `<div class="glass-panel p-4 rounded-xl">${f.titulo}</div>`).join('');
        }

        async function loadSaques() {
            const { data } = await supabase.from('solicitacoes_saque').select('*, perfis_premium(*)').eq('status', 'Pendente');
            document.getElementById('list-saques').innerHTML = data.map(s => `
                <div class="glass-panel p-4 rounded-xl">
                    <p class="font-bold">${s.perfis_premium?.email || 'Usuário'}</p>
                    <p class="text-emerald-400 font-black">R$ ${s.valor.toFixed(2)}</p>
                </div>
            `).join('');
        }

        loadDashboard();
    </script>
</body>
</html>
