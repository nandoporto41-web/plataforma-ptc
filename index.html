<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre Quant V6 - Painel Oficial</title>
    <style>
        /* BASE DO TEMA ESCURO (ESTILO TRADING/BINANCE) */
        body {
            background-color: #0b0e11;
            color: #eaecef;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-end; /* Alinha o painel na direita se necessário */
        }

        /* CONTAINER DO PAINEL LATERAL (CORRIGIDO) */
        .painel-lateral {
            width: 340px;
            height: 100vh;
            background-color: #181a20;
            border-left: 1px solid #2b2f36;
            box-shadow: -4px 0 16px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column; /* Organiza o topo, meio e o botão no fim */
            box-sizing: border-box;
        }

        /* CABEÇALHO DO PAINEL */
        .painel-header {
            padding: 20px;
            border-bottom: 1px solid #2b2f36;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .painel-header h2 {
            margin: 0;
            font-size: 18px;
            color: #f0b90b; /* Amarelo Premium */
            font-weight: 600;
        }

        /* ÁREA INTERNA COM ROLAGEM ISOLADA (CORRIGE O CORTE DO BOTÃO) */
        .painel-conteudo {
            flex: 1;
            overflow-y: auto; /* Permite rolar apenas o conteúdo de dentro */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-sizing: border-box;
            padding-bottom: 30px; /* Margem de segurança extra no fundo */
        }

        /* Esconde a barra de rolagem nativa horrível mantendo o funcionamento */
        .painel-conteudo::-webkit-scrollbar {
            width: 4px;
        }
        .painel-conteudo::-webkit-scrollbar-thumb {
            background-color: #2b2f36;
            border-radius: 4px;
        }

        /* NOVO CARD DE PERFIL (PASSA MUITA SERIEDADE) */
        .card-perfil-usuario {
            display: flex;
            align-items: center;
            gap: 14px;
            background: linear-gradient(135deg, #212630, #191e26);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #2b2f36;
        }

        .avatar-usuario {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid #f0b90b; /* Destaque dourado */
            object-fit: cover;
            background-color: #0b0e11;
        }

        .info-usuario {
            display: flex;
            flex-direction: column;
        }

        .info-usuario h3 {
            margin: 0;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
        }

        .status-usuario {
            margin: 4px 0 0 0;
            font-size: 12px;
            color: #848e9c;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ponto-status {
            width: 7px;
            height: 7px;
            background-color: #02c076; /* Verde online ativa */
            border-radius: 50%;
        }

        /* GRID DE INFORMAÇÕES TÉCNICAS DA CONTA */
        .grid-detalhes-conta {
            background-color: #121418;
            border-radius: 8px;
            padding: 6px 14px;
            border: 1px solid #1e222a;
        }

        .linha-detalhe {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e222a;
            font-size: 13px;
        }

        .linha-detalhe:last-child {
            border-bottom: none;
        }

        .label-detalhe {
            color: #848e9c;
        }

        .valor-detalhe {
            color: #eaecef;
            font-weight: 500;
        }

        .valor-detalhe.destaque {
            color: #f0b90b;
            font-weight: bold;
        }

        /* SEÇÃO INFERIOR ONDE FICA O BOTÃO DE SUPORTE */
        .painel-footer {
            margin-top: auto; /* Garante que o botão fique preso na parte de baixo */
            padding-top: 10px;
        }

        /* BOTÃO DE SUPORTE OFICIAL DO TELEGRAM */
        .btn-suporte-telegram {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #212630;
            border: 1px solid #f0b90b; /* Borda chamativa dourada */
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-suporte-telegram:hover {
            background-color: #2b3241;
            box-shadow: 0px 0px 10px rgba(240, 185, 11, 0.2);
        }
    </style>
</head>
<body>

    <!-- PAINEL LATERAL COMPLETO -->
    <div class="painel-lateral">
        
        <!-- HEADER -->
        <div class="painel-header">
            <h2>Seu Painel</h2>
        </div>

        <!-- CONTEÚDO ROLÁVEL -->
        <div class="painel-conteudo">
            
            <!-- ÁREA DE CADASTRO / PERFIL ATUALIZADA -->
            <div class="card-perfil-usuario">
                <!-- Gerador automático de avatar profissional com a inicial do usuário caso não tenha foto definida -->
                <img src="https://ui-avatars.com/api/?name=Mestre+Quant&background=f0b90b&color=000&bold=true" alt="Foto de Perfil" class="avatar-usuario">
                <div class="info-usuario">
                    <h3>Mestre da Operação</h3>
                    <p class="status-usuario"><span class="ponto-status"></span> Conta Ativa</p>
                </div>
            </div>

            <!-- EXIBIÇÃO DE DADOS TÉCNICOS DA CONTA -->
            <div class="grid-detalhes-conta">
                <div class="linha-detalhe">
                    <span class="label-detalhe">ID do Usuário</span>
                    <span class="valor-detalhe">#74839</span>
                </div>
                <div class="linha-detalhe">
                    <span class="label-detalhe">E-mail Cadastrado</span>
                    <span class="valor-detalhe">usuario@mestrelabs.com</span>
                </div>
                <div class="linha-detalhe">
                    <span class="label-detalhe">Pontos Acumulados</span>
                    <span class="valor-detalhe destaque">35 PTS</span>
                </div>
                <div class="linha-detalhe">
                    <span class="label-detalhe">Versão do Sistema</span>
                    <span class="valor-detalhe destaque">Mestre Quant V6</span>
                </div>
            </div>

            <!-- ESPAÇO PARA OS SEUS OUTROS ELEMENTOS (BOTÕES DE PIX, ETC) -->
            <!-- Você pode inserir novos blocos aqui no meio se precisar -->

            <!-- RODAPÉ DO PAINEL COM O LINK ATUALIZADO DO SEU TELEGRAM -->
            <div class="painel-footer">
                <a href="https://t.me/mestre_quant_v6" target="_blank" class="btn-suporte-telegram">
                    <!-- Ícone em vetor (SVG) do Balão de Chat para dar um ar profissional -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span>Suporte Mestre Quant</span>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
