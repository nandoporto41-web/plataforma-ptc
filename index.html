<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma PTC Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #121212; color: #E0E0E0; font-family: sans-serif; }
        .nav-active { color: #10B981; }
    </style>
</head>
<body class="flex flex-col min-h-screen pb-20">

    <header class="bg-[#1E1E1E] border-b border-gray-800 p-4 text-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-white flex items-center justify-center gap-2">Plataforma PTC Premium 💎</h1>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <section id="aba-inicio" class="space-y-4">
            <div class="bg-[#1E1E1E] p-6 rounded-2xl border border-gray-800 text-center shadow-lg">
                <p class="text-gray-400 text-sm mb-1">Seu Saldo Disponível</p>
                <h2 id="txt-saldo" class="text-4xl font-black text-emerald-400">R$ 0.0000</h2>
                <p class="text-gray-500 text-xs mt-3">Tarefas: <span id="txt-tarefas" class="font-bold text-white">0</span></p>
                <div id="status-banco" class="text-xs text-yellow-500 mt-2">Sincronizando...</div>
            </div>
        </section>

        <section id="aba-anuncios" class="space-y-4 hidden">
            <div class="bg-[#1E1E1E] p-4 rounded-2xl border border-gray-800 space-y-3">
                <h4 class="text-white font-bold text-sm">Anúncio #01</h4>
                <button onclick="startAd(0.1500, 15)" class="w-full bg-emerald-500 py-3 rounded-xl font-bold text-sm">Assistir Anúncio</button>
            </div>
        </section>

        <section id="aba-sacar" class="space-y-4 hidden">
            <div class="bg-[#1E1E1E] p-5 rounded-2xl border border-gray-800 space-y-4">
                <h3 class="text-sky-400 font-bold">Sacar via Pix</h3>
                <input type="text" id="chave-pix" placeholder="Sua chave Pix" class="w-full bg-[#2A2A2A] border p-3 rounded-xl text-white">
                <button onclick="requestWithdrawal()" class="w-full bg-sky-500 py-3 rounded-xl font-bold">Solicitar Saque</button>
            </div>
        </section>
    </main>

    <!-- Overlay de Temporizador -->
    <div id="timer-overlay" class="fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-50 hidden p-6 text-center">
        <h3 id="ad-title" class="text-lg font-bold text-white">Anúncio Aberto!</h3>
        <p class="text-sm text-gray-400 mb-4">Mantenha a janela do anúncio aberta e volte aqui após o tempo.</p>
        <div class="w-24 h-24 rounded-full border-4 border-emerald-500 flex items-center justify-center">
            <span id="countdown" class="text-3xl font-black text-white">00</span>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#1E1E1E] border-t p-2 flex justify-around items-center z-40 max-w-md mx-auto">
        <button onclick="changeTab('inicio')" class="flex flex-col items-center text-xs text-gray-400">Início</button>
        <button onclick="changeTab('anuncios')" class="flex flex-col items-center text-xs text-gray-400">Anúncios</button>
        <button onclick="changeTab('sacar')" class="flex flex-col items-center text-xs text-gray-400">Sacar</button>
    </nav>

    <script>
        const SUPABASE_URL = "https://hvivrmdygytttdlapjbi.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_mxIGnK-spI1ne3h-JYu4WQ_fqj1_dBM"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Gera ID único por usuário
        let USER_ID = localStorage.getItem('ptc_user_id');
        if (!USER_ID) {
            USER_ID = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('ptc_user_id', USER_ID);
        }

        let userData = { saldo: 0.0000, tarefas: 0 };

        async function loadUserData() {
            let { data, error } = await _supabase.from('usuarios_ptc').select('*').eq('id', USER_ID).single();
            if (error) {
                await _supabase.from('usuarios_ptc').insert([{ id: USER_ID, saldo: 0, tarefas: 0 }]);
            } else {
                userData = data;
                updateUI();
            }
            document.getElementById('status-banco').innerText = "🟢 Conectado";
        }

        function updateUI() {
            document.getElementById('txt-saldo').innerText = `R$ ${parseFloat(userData.saldo).toFixed(4)}`;
            document.getElementById('txt-tarefas').innerText = userData.tarefas;
        }

        function changeTab(tabName) {
            ['inicio', 'anuncios', 'sacar'].forEach(t => document.getElementById(`aba-${t}`).classList.add('hidden'));
            document.getElementById(`aba-${tabName}`).classList.remove('hidden');
        }

        function startAd(reward, duration) {
            const URL_MONETAG = "https://omg10.com/4/11216881";
            window.open(URL_MONETAG, "_blank"); // Abre em nova aba para evitar bloqueio de segurança

            const overlay = document.getElementById('timer-overlay');
            overlay.classList.remove('hidden');
            let timeLeft = duration;
            document.getElementById('countdown').innerText = timeLeft;

            const timer = setInterval(async () => {
                timeLeft--;
                document.getElementById('countdown').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    overlay.classList.add('hidden');
                    userData.saldo += reward;
                    userData.tarefas += 1;
                    updateUI();
                    await _supabase.from('usuarios_ptc').update({ saldo: userData.saldo, tarefas: userData.tarefas }).eq('id', USER_ID);
                }
            }, 1000);
        }

        async function requestWithdrawal() {
            alert("Pedido enviado!");
        }

        window.onload = loadUserData;
    </script>
</body>
</html>
