<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineRewards — Entretenimento que te Premia</title>
    
    <!-- CDNs de Alta Performance -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        :root {
            --bg-main: #06060c;
            --bg-surface: #0a0b10;
            --bg-card: #11131e;
            --primary: #ff9d00;
            --secondary: #ffbe1a;
            --success: #10b981;
            --danger: #f43f5e;
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        .app-shell {
            width: 100%;
            max-width: 480px;
            background: var(--bg-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 90px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Toast System */
        .toast-system {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%);
            width: calc(100% - 40px); max-width: 440px; background: var(--bg-card);
            border: 1px solid var(--border); padding: 14px 18px; border-radius: 14px;
            z-index: 9999; backdrop-filter: blur(20px); font-size: 13px; display: flex; align-items: center; gap: 12px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast-system.active { transform: translateX(-50%) translateY(0); }
        .toast-system.success { border-color: var(--success); color: var(--success); }
        .toast-system.danger { border-color: var(--danger); color: var(--danger); }

        /* Top Header Area */
        .app-header {
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
            background: #0a0b10; width: 100%; z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .header-logo { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 6px; }
        .header-logo span { color: var(--primary); }
        .header-user-status { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); }
        .header-user-status span { font-size: 11px; font-weight: 700; color: #fff; }

        /* Banner Principal Highlight - Dinâmico */
        .hero-showcase {
            position: relative; width: 100%; height: 320px; background: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=800') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 24px;
        }
        .hero-showcase::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(10,11,16,0.2) 0%, rgba(10,11,16,1) 100%);
        }
        .hero-content { position: relative; z-index: 10; display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
        .hero-title { font-size: 26px; font-weight: 800; color: #fff; text-transform: uppercase; line-height: 1.1; letter-spacing: -0.5px; }
        .btn-watch-now {
            background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000;
            font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 12px 24px; border-radius: 25px; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 6px 20px rgba(255,157,0,0.3); transition: transform 0.2s;
        }
        .btn-watch-now:hover { transform: scale(1.03); }

        /* Content Shell Fluid */
        .content-body { padding: 20px; display: flex; flex-direction: column; gap: 24px; position: relative; z-index: 20; }
        .content-body.home-adjusted { margin-top: -20px; }

        /* Seções de Grade de Funcionalidades/Novidades */
        .section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        
        .novelty-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .novelty-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: border-color 0.2s; }
        .novelty-card:hover { border-color: rgba(255,157,0,0.3); }
        .novelty-icon { width: 36px; height: 36px; background: rgba(255,157,0,0.06); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 15px; }
        .novelty-card h4 { font-size: 12px; font-weight: 700; color: #fff; }
        .novelty-card p { font-size: 10px; color: var(--text-muted); line-height: 1.3; }

        /* Feed Realtime de Saques Concluídos */
        .payout-feed { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; display: flex; flex-direction: column; gap: 2px; }
        .payout-feed-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .payout-feed-row:last-child { border-bottom: none; padding-bottom: 0; }
        .payout-user { display: flex; align-items: center; gap: 10px; }
        .payout-user img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #222; }
        .payout-user span { font-size: 12px; font-weight: 600; color: #fff; }
        .payout-val { font-size: 12px; font-weight: 700; color: var(--success); }

        /* Catálogo Horizontal e Grade de Filmes */
        .catalog-scroller { display: flex; gap: 12px; overflow-x: auto; padding: 8px 0; scrollbar-width: none; }
        .catalog-scroller::-webkit-scrollbar { display: none; }
        .media-poster-card { min-width: 115px; width: 115px; height: 165px; background: #181a26; border-radius: 14px; overflow: hidden; position: relative; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
        .media-poster-card.active { border-color: var(--primary); }
        .media-poster-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Caixa Estruturada de Saque Profissional */
        .finance-card { background: linear-gradient(135deg, #11131e, #171224); border: 1px solid var(--border); border-radius: 20px; padding: 22px; display: flex; flex-direction: column; gap: 16px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        .app-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: #fff; font-size: 13px; outline: none; transition: border-color 0.2s; }
        .app-input:focus { border-color: var(--primary); }

        /* Floating Bottom Bar */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 80px; background: linear-gradient(to top, #06060c 70%, transparent); display: flex; align-items: flex-end; padding: 0 16px 14px 16px; z-index: 2000; }
        .nav-container { width: 100%; height: 58px; background: rgba(17, 19, 30, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--text-muted); width: 60px; transition: color 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 16px; }
        .nav-item span { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }

        /* Media Viewport Embutido Oculto Estrutural */
        .hidden-player-box { width: 0; height: 0; opacity: 0; pointer-events: none; }

        /* Auth Canvas Gate */
        .auth-gate { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 100vh; background: var(--bg-main); z-index: 99999; display: flex; flex-direction: column; padding: 40px 24px; justify-content: center; }
        .auth-gate.hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Sistema de Avisos do Aplicativo -->
    <div class="toast-system" id="appToast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="appToastText">Operação Realizada</span>
    </div>

    <!-- Tela de Acesso Segura -->
    <div class="auth-gate" id="authScreen">
        <div style="text-align: center; margin-bottom: 35px;">
            <h1 style="font-size: 34px; font-weight: 800; color: var(--primary); letter-spacing: -1px;">CINE REWARDS</h1>
            <p style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Entretenimento que te Premia</p>
        </div>
        <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
            <input type="email" id="authEmail" class="app-input" placeholder="Seu e-mail cadastrado">
            <input type="password" id="authPassword" class="app-input" placeholder="Sua senha de acesso">
        </div>
        <button class="btn-watch-now" style="width:100%; justify-content:center;" onclick="AppEngine.Auth.submit()">Acessar Plataforma</button>
        <p id="authToggleBtn" style="text-align:center; font-size:12px; color:var(--primary); margin-top:20px; cursor:pointer;" onclick="AppEngine.Auth.toggle()">Novo por aqui? Crie uma conta</p>
    </div>

    <!-- IFrame do YouTube Oculto para contagem de tempo -->
    <div class="hidden-player-box">
        <div id="ytPlayerFrame"></div>
    </div>

    <div class="app-shell">
        
        <!-- Header Fixo Superior -->
        <header class="app-header">
            <div class="header-logo">
                <i class="fa-solid fa-play" style="color:var(--primary);"></i> CINE<span>REWARDS</span>
            </div>
            <div class="header-user-status">
                <i class="fa-solid fa-bolt" style="color:var(--primary); font-size:11px;"></i>
                <span id="headerPointsCounter">125.580 PTS</span>
            </div>
        </header>

        <!-- Banner Dinâmico Superior (Controlado pelo script de navegação) -->
        <section class="hero-showcase" id="heroBanner">
            <div class="hero-content">
                <span style="font-size:10px; background:rgba(255,157,0,0.2); color:var(--primary); padding:4px 10px; border-radius:12px; font-weight:800; text-transform:uppercase;">Em Destaque</span>
                <h2 class="hero-title" id="heroTitleLabel">John Wick 4<br>Babayaga</h2>
                <button class="btn-watch-now" onclick="AppEngine.Player.playCurrent()"><i class="fa-solid fa-circle-play"></i> Assistir Agora</button>
            </div>
        </section>

        <!-- SPA Content Render -->
        <main class="content-body" id="spaContent">
            <!-- Renderizado via JavaScript -->
        </main>

        <!-- Barra de Navegação Inferior -->
        <nav class="bottom-nav">
            <div class="nav-container">
                <div class="nav-item active" id="tab-home" onclick="AppEngine.UI.navigate('home')">
                    <i class="fa-solid fa-house"></i><span>Início</span>
                </div>
                <div class="nav-item" id="tab-missions" onclick="AppEngine.UI.navigate('missions')">
                    <i class="fa-solid fa-star"></i><span>Missões</span>
                </div>
                <div class="nav-item" id="tab-wallet" onclick="AppEngine.UI.navigate('wallet')">
                    <i class="fa-solid fa-wallet"></i><span>Carteira</span>
                </div>
                <div class="nav-item" id="tab-ranking" onclick="AppEngine.UI.navigate('ranking')">
                    <i class="fa-solid fa-trophy"></i><span>Ranking</span>
                </div>
                <div class="nav-item" id="tab-profile" onclick="AppEngine.UI.navigate('profile')">
                    <i class="fa-solid fa-user"></i><span>Perfil</span>
                </div>
            </div>
        </nav>

    </div>

    <script>
        // Inicialização do Supabase Client
        const SupabaseClient = supabase.createClient(
            'https://hvivrmdygytttdlapjbi.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODc4NDMsImV4cCI6MjA5ODI2Mzg0M30.7tEyMfCreAwn7e2zikqWtdErjEHCL-la4-RzPxN1Twg'
        );

        let isSignup = false;
        let ytPlayer = null;
        let pointsTicker = null;

        const mediaLibrary = [
            { id: 'ykxV5I2PQCE', title: 'John Wick 4', category: 'Ação', thumb: 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=300' },
            { id: 'KIZ5crgHkPY', title: 'Até que a Sorte nos Separe', category: 'Comédia', thumb: 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=300' },
            { id: 'VwNAFqsxAVg', title: 'Sete Homens e um Destino', category: 'Ação', thumb: 'https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=300' }
        ];

        const simulatedPayouts = [
            { name: "Mateus S.", value: "R$ 48,70", time: "há 1 min", img: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" },
            { name: "Juliana A.", value: "R$ 23,50", time: "há 2 min", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" },
            { name: "Carlos H.", value: "R$ 57,20", time: "há 3 min", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100" }
        ];

        const AppEngine = {
            User: null,
            Wallet: { points: 125580, balance: 12.55 },
            ActiveTrackId: 'ykxV5I2PQCE',

            Init: function() {
                this.Auth.sync();
            },

            Auth: {
                toggle: function() {
                    isSignup = !isSignup;
                    document.getElementById('authToggleBtn').innerText = isSignup ? "Já tem uma conta? Conectar" : "Novo por aqui? Crie uma conta";
                    document.querySelector('#authScreen .btn-watch-now').innerText = isSignup ? "Criar Minha Conta" : "Acessar Plataforma";
                },
                submit: async function() {
                    const email = document.getElementById('authEmail').value;
                    const pass = document.getElementById('authPassword').value;
                    if(!email || !pass) return;

                    if(isSignup) {
                        const { error } = await SupabaseClient.auth.signUp({ email, password: pass });
                        if(error) AppEngine.UI.notify(error.message, 'danger');
                        else { AppEngine.UI.notify('Conta registrada! Faça o seu login.', 'success'); this.toggle(); }
                    } else {
                        const { error } = await SupabaseClient.auth.signInWithPassword({ email, password: pass });
                        if(error) AppEngine.UI.notify(error.message, 'danger');
                    }
                },
                sync: function() {
                    SupabaseClient.auth.onAuthStateChange(async (event, session) => {
                        if(session) {
                            AppEngine.User = session.user;
                            document.getElementById('authScreen').classList.add('hidden');
                            await AppEngine.Data.load();
                            AppEngine.UI.navigate('home');
                        } else {
                            AppEngine.User = null;
                            document.getElementById('authScreen').classList.remove('hidden');
                        }
                    });
                }
            },

            Data: {
                load: async function() {
                    if(!AppEngine.User) return;
                    try {
                        const { data } = await SupabaseClient.from('wallets').select('*').eq('id', AppEngine.User.id).maybeSingle();
                        if(data) {
                            AppEngine.Wallet.points = data.pontos;
                            AppEngine.Wallet.balance = data.saldo_reais;
                        }
                        document.getElementById('headerPointsCounter').innerText = `${AppEngine.Wallet.points.toLocaleString('pt-BR')} PTS`;
                    } catch(e) {
                        console.log("Banco sincronizado localmente.");
                    }
                }
            },

            Player: {
                playCurrent: function() {
                    if(ytPlayer && ytPlayer.playVideo) {
                        ytPlayer.playVideo();
                        AppEngine.UI.notify('Reprodução iniciada com sucesso!', 'success');
                    }
                }
            },

            UI: {
                notify: function(msg, mode = 'success') {
                    const t = document.getElementById('appToast');
                    t.className = `toast-system ${mode} active`;
                    document.getElementById('appToastText').innerText = msg;
                    setTimeout(() => t.classList.remove('active'), 3000);
                },
                navigate: function(tab) {
                    // Remove active de todos os botões e aplica no selecionado
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    const target = document.getElementById(`tab-${tab}`);
                    if(target) target.classList.add('active');

                    const renderArea = document.getElementById('spaContent');
                    const heroBanner = document.getElementById('heroBanner');
                    
                    // CONTROLE DO BANNER DESTAQUE: Mostra apenas na Home
                    if (tab === 'home') {
                        heroBanner.style.display = 'flex';
                        renderArea.className = "content-body home-adjusted";
                        
                        renderArea.innerHTML = `
                            <!-- Seção Novidades -->
                            <div>
                                <h3 class="section-title"><i class="fa-solid fa-wand-magic-sparkles"></i> Novidades</h3>
                                <div class="novelty-grid">
                                    <div class="novelty-card" onclick="AppEngine.UI.navigate('missions')">
                                        <div class="novelty-icon"><i class="fa-solid fa-calendar-check"></i></div>
                                        <h4>Missões Diárias</h4>
                                        <p>Complete tarefas e ganhe pontos todos os dias</p>
                                    </div>
                                    <div class="novelty-card" onclick="AppEngine.UI.notify('Roleta disponível a cada 24 horas.', 'danger')">
                                        <div class="novelty-icon"><i class="fa-solid fa-wheelchair-move"></i></div>
                                        <h4>Roleta da Sorte</h4>
                                        <p>Gire a roleta e ganhe prêmios incríveis</p>
                                    </div>
                                    <div class="novelty-card" onclick="AppEngine.UI.navigate('profile')">
                                        <div class="novelty-icon"><i class="fa-solid fa-layer-group"></i></div>
                                        <h4>Níveis & Recompensas</h4>
                                        <p>Suba de nível e desbloqueie benefícios</p>
                                    </div>
                                    <div class="novelty-card" onclick="AppEngine.UI.navigate('wallet')">
                                        <div class="novelty-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                                        <h4>Saque via PIX</h4>
                                        <p>Resgate seus pontos de forma rápida e segura</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Carrossel de Filmes -->
                            <div>
                                <h3 class="section-title"><i class="fa-solid fa-play"></i> Continue Assistindo</h3>
                                <div class="catalog-scroller">
                                    ${mediaLibrary.map(v => `
                                        <div class="media-poster-card ${v.id === AppEngine.ActiveTrackId ? 'active' : ''}" onclick="AppEngine.ActiveTrackId='${v.id}'; document.getElementById('heroTitleLabel').innerHTML='${v.title}'; if(ytPlayer) ytPlayer.loadVideoById('${v.id}'); AppEngine.UI.navigate('home');">
                                            <img src="${v.thumb}">
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <!-- Saques Realizados -->
                            <div class="payout-feed">
                                <h3 class="section-title" style="margin-bottom:8px;"><i class="fa-solid fa-circle-dollar-to-slot"></i> Saques Realizados Agora</h3>
                                ${simulatedPayouts.map(p => `
                                    <div class="payout-feed-row">
                                        <div class="payout-user">
                                            <img src="${p.img}">
                                            <span>${p.name}</span>
                                        </div>
                                        <div style="text-align:right;">
                                            <span class="payout-val">${p.value}</span>
                                            <small style="display:block; font-size:9px; color:var(--text-muted);">${p.time} via PIX</small>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    } else {
                        // Oculta completamente o banner gigante nas outras páginas
                        heroBanner.style.display = 'none';
                        renderArea.className = "content-body"; // Remove margem negativa interna
                        
                        if(tab === 'missions') {
                            renderArea.innerHTML = `
                                <h3 class="section-title"><i class="fa-solid fa-star"></i> Missões Disponíveis</h3>
                                <div style="background:var(--bg-card); border:1px solid var(--border); padding:20px; border-radius:18px; display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                                    <div>
                                        <h4 style="font-size:14px; font-weight:700;">Assistir por 10 minutos</h4>
                                        <p style="font-size:11px; color:var(--text-muted); margin-top:4px;">Assista a qualquer título do catálogo ativo</p>
                                    </div>
                                    <span style="font-size:13px; font-weight:800; color:var(--primary);">+150 PTS</span>
                                </div>
                            `;
                        }

                        else if(tab === 'wallet') {
                            renderArea.innerHTML = `
                                <div class="finance-card" style="margin-top: 8px;">
                                    <h3 class="section-title" style="color:#fff;"><i class="fa-solid fa-wallet"></i> Solicitar Resgate PIX</h3>
                                    <div style="background:rgba(0,0,0,0.3); padding:16px; border-radius:14px;">
                                        <span style="font-size:10px; color:var(--text-muted); display:block; text-transform:uppercase; letter-spacing:0.5px;">Saldo Disponível</span>
                                        <h2 style="color:var(--success); font-size:28px; font-weight:800; margin-top:4px;">R$ ${AppEngine.Wallet.balance.toFixed(2)}</h2>
                                    </div>
                                    <div class="input-group">
                                        <label>Chave Destino PIX</label>
                                        <input type="text" id="pixKeyField" class="app-input" placeholder="Insira seu CPF, E-mail ou Telefone">
                                    </div>
                                    <button class="btn-watch-now" style="width:100%; justify-content:center; margin-top:8px;" onclick="AppEngine.UI.executeCashout()">Solicitar Saque Instantâneo</button>
                                </div>
                            `;
                        }

                        else if(tab === 'ranking') {
                            renderArea.innerHTML = `
                                <h3 class="section-title"><i class="fa-solid fa-trophy"></i> Liderança Global</h3>
                                <div class="payout-feed" style="margin-top:8px;">
                                    <div class="payout-feed-row">
                                        <span style="font-weight:800; color:var(--primary); font-size:14px;">#1</span>
                                        <span style="font-size:13px;">Gabriel R.</span>
                                        <span style="font-weight:700; font-size:13px;">258.940 pts</span>
                                    </div>
                                    <div class="payout-feed-row">
                                        <span style="font-weight:800; color:var(--text-muted); font-size:14px;">#2</span>
                                        <span style="font-size:13px;">Beatriz M.</span>
                                        <span style="font-weight:700; font-size:13px;">241.320 pts</span>
                                    </div>
                                </div>
                            `;
                        }

                        else if(tab === 'profile') {
                            renderArea.innerHTML = `
                                <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:18px; padding:24px; text-align:center; margin-top:8px;">
                                    <div style="width:64px; height:64px; background:linear-gradient(45deg, var(--primary), var(--secondary)); color:#000; font-size:24px; font-weight:800; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 14px auto;">U</div>
                                    <h4 style="font-size:16px; font-weight:700;">Membro Premium</h4>
                                    <p style="font-size:11px; color:var(--text-muted); margin-top:4px;">ID: ${AppEngine.User ? AppEngine.User.id.slice(0,8).toUpperCase() : '17F96956'}</p>
                                    <button class="app-input" style="width:100%; margin-top:24px; background:transparent; border-color:var(--danger); color:var(--danger); cursor:pointer; font-weight:600;" onclick="SupabaseClient.auth.signOut()">Sair da Conta</button>
                                </div>
                            `;
                        }
                    }
                },
                executeCashout: function() {
                    const val = document.getElementById('pixKeyField').value;
                    if(!val) return this.notify('Informe uma chave PIX válida.', 'danger');
                    this.notify('Pontos insuficientes para realizar o resgate hoje (Mínimo 200.000 pts).', 'danger');
                }
            }
        };

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('ytPlayerFrame', {
                videoId: AppEngine.ActiveTrackId,
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1 },
                events: {
                    'onStateChange': (event) => {
                        if(event.data === YT.PlayerState.PLAYING) {
                            if(!pointsTicker) {
                                pointsTicker = setInterval(() => {
                                    AppEngine.Wallet.points += 15;
                                    AppEngine.Wallet.balance += 0.01;
                                    document.getElementById('headerPointsCounter').innerText = `${AppEngine.Wallet.points.toLocaleString('pt-BR')} PTS`;
                                    AppEngine.UI.notify('+15 PTS acumulados assistindo!');
                                }, 15000);
                            }
                        } else {
                            clearInterval(pointsTicker);
                            pointsTicker = null;
                        }
                    }
                }
            });
        }

        AppEngine.Init();
    </script>
</body>
</html>
