<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineRewards Enterprise v5 — Plataforma Oficial</title>
    
    <!-- CDN de Recursos Premium -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        :root {
            --bg-main: #060609;
            --bg-surface: #0f0f15;
            --bg-card: #141420;
            --primary: #ff9d00;
            --secondary: #ffb700;
            --success: #10b981;
            --danger: #f43f5e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.05);
            --glass: rgba(15, 15, 21, 0.75);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        .app-shell {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        /* Toast Component */
        .toast-system {
            position: absolute;
            top: 85px; left: 15px; right: 15px;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 12px 16px; border-radius: 14px;
            z-index: 3000; backdrop-filter: blur(20px);
            font-size: 12px; display: flex; align-items: center; gap: 10px;
            transform: translateY(-200%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast-system.active { transform: translateY(0); }
        .toast-system.success { border-color: var(--success); color: var(--success); }
        .toast-system.danger { border-color: var(--danger); color: var(--danger); }

        /* Navbar */
        .app-bar {
            position: absolute; top: 0; left: 0; right: 0; height: 70px;
            background: var(--glass); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000;
        }
        .app-bar .logo { font-weight: 800; font-size: 15px; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .wallet-pill {
            display: flex; align-items: center; gap: 6px; background: var(--bg-card);
            padding: 6px 14px; border-radius: 30px; border: 1px solid var(--border); cursor: pointer;
        }
        .wallet-pill span { font-size: 11px; font-weight: 700; color: var(--primary); }

        /* Media Viewport */
        .media-box { width: 100%; height: 253px; background: #000; margin-top: 70px; position: relative; z-index: 900; }
        #ytPlayerFrame { width: 100%; height: 100%; border: none; }

        /* Main Screen Container */
        .screen-container { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 20px; }
        
        .card-premium { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .card-row { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 13px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
        .card-subtitle { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

        /* Grid de Vídeos */
        .grid-videos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .video-thumbnail-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
        .video-thumbnail-card img { width: 100%; height: 95px; object-fit: cover; }
        .video-info-wrapper { padding: 10px; }
        .video-info-wrapper h5 { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-info-wrapper span { font-size: 9px; color: var(--primary); display: block; margin-top: 4px; }

        /* Bottom Nav */
        .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, #060609 80%, transparent); padding: 0 15px; display: flex; align-items: center; z-index: 1000; }
        .nav-dock { width: 100%; height: 56px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; display: flex; justify-content: space-around; align-items: center; }
        .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--text-muted); width: 60px; transition: color 0.2s; }
        .nav-tab.active { color: var(--primary); }
        .nav-tab i { font-size: 15px; }
        .nav-tab span { font-size: 9px; font-weight: 600; }

        /* Drawer Overlay */
        .overlay-drawer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .overlay-drawer.active { opacity: 1; pointer-events: auto; }
        .drawer-box { position: absolute; bottom: -100%; left: 0; right: 0; max-height: 75%; background: var(--bg-surface); border-top: 1px solid var(--border); border-radius: 24px 24px 0 0; z-index: 2100; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; transition: bottom 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .drawer-box.active { bottom: 0; }

        /* Inputs e Botões */
        .input-premium { background: var(--bg-card); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: #fff; font-size: 13px; outline: none; }
        .input-premium:focus { border-color: var(--primary); }
        .btn-premium { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #000; font-weight: 700; font-size: 12px; border: none; padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }

        /* Auth Screen */
        .auth-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 4000; display: flex; flex-direction: column; padding: 40px 24px; }
        .auth-canvas.hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- Alertas do Sistema -->
        <div class="toast-system" id="appToast">
            <i class="fa-solid fa-circle-info"></i>
            <span id="appToastText">Mensagem Administrativa</span>
        </div>

        <!-- Portão de Autenticação Real -->
        <div class="auth-canvas" id="authGate">
            <div style="text-align: center; margin-bottom: 40px; margin-top: 30px;">
                <h1 style="font-size: 32px; font-weight: 800; color: var(--primary); letter-spacing: -1px;">CineRewards</h1>
                <p style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px;">Enterprise Security Ecosystem</p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px;">
                <input type="email" id="emailInput" class="input-premium" placeholder="Endereço de e-mail">
                <input type="password" id="passwordInput" class="input-premium" placeholder="Senha de acesso">
            </div>
            <button class="btn-premium" style="padding: 14px;" onclick="CoreEngine.Auth.execute()">Conectar com Segurança</button>
            <p id="toggleAuthLabel" style="text-align:center; font-size:12px; color:var(--primary); margin-top:20px; cursor:pointer; text-decoration:underline;" onclick="CoreEngine.Auth.toggleMode()">Não tem conta? Cadastre-se</p>
        </div>

        <!-- App Bar -->
        <header class="app-bar">
            <span class="logo">CINE REWARDS</span>
            <div class="wallet-pill" onclick="CoreEngine.UI.openDrawer('walletDrawer')">
                <i class="fa-solid fa-wallet" style="color: var(--primary); font-size: 11px;"></i>
                <span id="topBarPoints">0 PTS</span>
            </div>
        </header>

        <!-- Player Viewport -->
        <div class="media-box">
            <div id="ytPlayerFrame"></div>
        </div>

        <!-- Dynamic Container (SPA) -->
        <main class="screen-container" id="screenViewPort">
            <!-- Injetado dinamicamente via CoreEngine.UI -->
        </main>

        <!-- Tab Bar Inferior -->
        <nav class="bottom-bar">
            <div class="nav-dock">
                <div class="nav-tab active" id="tab-cinema" onclick="CoreEngine.UI.navigate('cinema')">
                    <i class="fa-solid fa-play"></i><span>Cinema</span>
                </div>
                <div class="nav-tab" id="tab-missions" onclick="CoreEngine.UI.navigate('missions')">
                    <i class="fa-solid fa-bolt"></i><span>Missões</span>
                </div>
                <div class="nav-tab" id="tab-ranking" onclick="CoreEngine.UI.navigate('ranking')">
                    <i class="fa-solid fa-trophy"></i><span>Ranking</span>
                </div>
                <div class="nav-tab" id="tab-profile" onclick="CoreEngine.UI.navigate('profile')">
                    <i class="fa-solid fa-user"></i><span>Perfil</span>
                </div>
            </div>
        </nav>

        <!-- Drawer Carteira/Saques -->
        <div class="overlay-drawer" id="appOverlay" onclick="CoreEngine.UI.closeDrawer()"></div>
        <div class="drawer-box" id="walletDrawer">
            <div class="card-row">
                <h3 class="card-title"><i class="fa-solid fa-building-columns" style="color:var(--primary)"></i> Solicitar Faturamento</h3>
                <i class="fa-solid fa-xmark" style="cursor:pointer" onclick="CoreEngine.UI.closeDrawer()"></i>
            </div>
            <div class="card-premium" style="background:var(--bg-main)">
                <span class="card-subtitle">Saldo Disponível Convertido</span>
                <h2 style="font-size:28px; color:var(--success); font-weight:800;" id="drawerBalanceCash">R$ 0,00</h2>
                <span class="card-subtitle" id="drawerBalancePoints">0 pontos no balanço estável</span>
            </div>
            <input type="text" id="pixKey" class="input-premium" placeholder="Chave PIX (CPF, E-mail ou Telefone)">
            <button class="btn-premium" onclick="CoreEngine.Economy.withdraw()">Efetuar Saque via PIX</button>
        </div>

    </div>

    <!-- Core Engine Engine -->
    <script>
        const Supabase = supabase.createClient(
            'https://hvivrmdygytttdlapjbi.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODc4NDMsImV4cCI6MjA5ODI2Mzg0M30.7tEyMfCreAwn7e2zikqWtdErjEHCL-la4-RzPxN1Twg'
        );

        let isSignUp = false;
        let ytPlayer = null;
        let isPlayerReady = false;
        let watchSyncInterval = null;

        const catalogData = [
            { id: 'ykxV5I2PQCE', titulo: 'O Maior Ladrão do Mundo', cat: 'Suspense' },
            { id: 'KIZ5crgHkPY', titulo: 'Até que a Sorte nos Separe', cat: 'Comédia' },
            { id: 'VwNAFqsxAVg', titulo: 'Sete Homens e um Destino', cat: 'Ação' }
        ];

        const CoreEngine = {
            User: null,
            Data: { pontos: 0, saldo_reais: 0.00, nivel: 'Bronze' },
            ActiveVideoId: 'ykxV5I2PQCE',

            Init: function() {
                this.Auth.listener();
            },

            Auth: {
                toggleMode: function() {
                    isSignUp = !isSignUp;
                    document.getElementById('toggleAuthLabel').innerText = isSignUp ? "Já possui conta? Entre aqui" : "Não tem conta? Cadastre-se";
                    document.querySelector('#authGate .btn-premium').innerText = isSignUp ? "Registrar Nova Conta" : "Conectar com Segurança";
                },
                execute: async function() {
                    const email = document.getElementById('emailInput').value;
                    const pass = document.getElementById('passwordInput').value;
                    if(!email || !pass) return;

                    if(isSignUp) {
                        const { error } = await Supabase.auth.signUp({ email, password: pass });
                        if(error) CoreEngine.UI.toast(error.message, 'danger');
                        else { CoreEngine.UI.toast('Cadastro realizado! Faça o login.', 'success'); this.toggleMode(); }
                    } else {
                        const { error } = await Supabase.auth.signInWithPassword({ email, password: pass });
                        if(error) CoreEngine.UI.toast(error.message, 'danger');
                    }
                },
                listener: function() {
                    Supabase.auth.onAuthStateChange(async (event, session) => {
                        if(session) {
                            CoreEngine.User = session.user;
                            document.getElementById('authGate').classList.add('hidden');
                            await CoreEngine.Backend.sync();
                            CoreEngine.UI.navigate('cinema');
                        } else {
                            CoreEngine.User = null;
                            document.getElementById('authGate').classList.remove('hidden');
                            clearInterval(watchSyncInterval);
                        }
                    });
                }
            },

            Backend: {
                sync: async function() {
                    if(!CoreEngine.User) return;
                    
                    // Coleta dados em tempo real direto da carteira protegida por RLS
                    const { data: wallet } = await Supabase.from('wallets').select('*').eq('id', CoreEngine.User.id).maybeSingle();
                    const { data: profile } = await Supabase.from('profiles').select('*').eq('id', CoreEngine.User.id).maybeSingle();

                    if(wallet) {
                        CoreEngine.Data.pontos = wallet.pontos;
                        CoreEngine.Data.saldo_reais = wallet.saldo_reais;
                    }
                    if(profile) {
                        CoreEngine.Data.nivel = profile.nivel;
                    }
                    CoreEngine.UI.updateDOMBalances();
                },

                sendWatchTick: async function() {
                    if(!CoreEngine.User) return;

                    // CHAMADA RPC REAL: Invoca a função compilada no Servidor PostgreSQL
                    const { data, error } = await Supabase.rpc('registrar_tempo_assistido', {
                        p_video_id: CoreEngine.ActiveVideoId,
                        p_fingerprint: 'hw_fingerprint_v5_prod'
                    });

                    if(error) {
                        console.error(error.message);
                        return;
                    }

                    if(data && data.sucesso) {
                        CoreEngine.Data.pontos = data.total_pontos;
                        CoreEngine.Data.saldo_reais = data.total_reais;
                        CoreEngine.UI.updateDOMBalances();
                        CoreEngine.UI.toast(`+${data.pontos_adicionados} PTS processados pelo Servidor.`, 'success');
                    } else if(data && data.erro) {
                        CoreEngine.UI.toast(data.erro, 'danger');
                    }
                }
            },

            Economy: {
                withdraw: async function() {
                    const key = document.getElementById('pixKey').value;
                    if(!key) return;

                    if(CoreEngine.Data.pontos < 200000) {
                        CoreEngine.UI.toast('Saldo insuficiente para faturamento (Mínimo R$20,00).', 'danger');
                        return;
                    }

                    const { error } = await Supabase.from('withdrawals').insert([{
                        user_id: CoreEngine.User.id,
                        chave_pix: key,
                        valor: 20.00
                    }]);

                    if(!error) {
                        CoreEngine.UI.toast('Saque registrado! Processando auditoria na Blockchain/PIX.', 'success');
                        CoreEngine.UI.closeDrawer();
                        await CoreEngine.Backend.sync();
                    }
                }
            },

            UI: {
                navigate: function(screen) {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    const targetTab = document.getElementById(`tab-${screen}`);
                    if(targetTab) targetTab.classList.add('active');

                    const container = document.getElementById('screenViewPort');
                    container.innerHTML = Screens[screen] ? Screens[screen]() : '';

                    if(screen === 'cinema') this.renderVideos();
                },
                renderVideos: function() {
                    const grid = document.getElementById('catalogGridContainer');
                    if(!grid) return;
                    grid.innerHTML = '';
                    catalogData.forEach(v => {
                        const card = document.createElement('div');
                        card.className = 'video-thumbnail-card';
                        card.onclick = () => {
                            CoreEngine.ActiveVideoId = v.id;
                            if(ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById(v.id);
                        };
                        card.innerHTML = `
                            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=300" alt="Cover">
                            <div class="video-info-wrapper">
                                <h5>${v.titulo}</h5>
                                <span>${v.cat} • Servidor Ativo</span>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                },
                openDrawer: function(id) {
                    document.getElementById('appOverlay').classList.add('active');
                    document.getElementById(id).classList.add('active');
                },
                closeDrawer: function() {
                    document.getElementById('appOverlay').classList.remove('active');
                    document.querySelectorAll('.drawer-box').forEach(d => d.classList.remove('active'));
                },
                toast: function(txt, type = 'success') {
                    const t = document.getElementById('appToast');
                    t.className = `toast-system ${type} active`;
                    document.getElementById('appToastText').innerText = txt;
                    setTimeout(() => t.classList.remove('active'), 3500);
                },
                updateDOMBalances: function() {
                    const pts = CoreEngine.Data.pontos;
                    const cash = parseFloat(CoreEngine.Data.saldo_reais).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    
                    document.getElementById('topBarPoints').innerText = `${pts} PTS`;
                    if(document.getElementById('drawerBalanceCash')) {
                        document.getElementById('drawerBalanceCash').innerText = cash;
                        document.getElementById('drawerBalancePoints').innerText = `${pts} pontos validados pelo Ledger.`;
                    }
                }
            }
        };

        // Escutador Universal da API do YouTube Player
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('ytPlayerFrame', {
                videoId: CoreEngine.ActiveVideoId,
                playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'modestbranding': 1 },
                events: { 'onStateChange': (e) => {
                    if(e.data === YT.PlayerState.PLAYING) {
                        // Dispara a validação a cada 30 segundos exatos de retenção física
                        if(!watchSyncInterval) {
                            watchSyncInterval = setInterval(() => { CoreEngine.Backend.sendWatchTick(); }, 30000);
                        }
                    } else {
                        clearInterval(watchSyncInterval);
                        watchSyncInterval = null;
                    }
                }}
            });
        }

        // Dicionário de Telas SPA (View Rendering)
        const Screens = {
            cinema: () => `
                <div class="card-premium">
                    <span class="card-title"><i class="fa-solid fa-satellite-dish" style="color:var(--primary)"></i> Transmissão Criptografada</span>
                    <span class="card-subtitle">O balanço de auditoria monitora esta sessão. Mantenha a janela visível e ativa para pontuar.</span>
                </div>
                <h4 style="font-size:12px; font-weight:700; text-transform:uppercase; color:var(--primary)">Coleção de Mídia</h4>
                <div class="grid-videos" id="catalogGridContainer"></div>
            `,
            missions: () => `
                <h3 style="font-size:16px; font-weight:800;">Pool de Missões</h3>
                <div class="card-premium">
                    <div class="card-row">
                        <span class="card-title">Fidelidade Diária</span>
                        <span style="color:var(--primary); font-weight:700; font-size:11px;">+100 PTS</span>
                    </div>
                    <span class="card-subtitle">Assista 10 minutos de conteúdo hoje para desbloquear o gatilho da wallet.</span>
                </div>
            `,
            ranking: () => `
                <h3 style="font-size:16px; font-weight:800;">Conselho de Líderes</h3>
                <div class="card-premium">
                    <div class="card-row" style="padding:4px 0; border-bottom:1px solid var(--border)">
                        <span style="font-size:12px;">1. Diretor_Geral</span>
                        <span style="font-size:12px; color:var(--primary); font-weight:700;">854.000 PTS</span>
                    </div>
                    <div class="card-row" style="padding:4px 0;">
                        <span style="font-size:12px;">2. Você (${CoreEngine.Data.nivel})</span>
                        <span style="font-size:12px; color:var(--primary); font-weight:700;">${CoreEngine.Data.pontos} PTS</span>
                    </div>
                </div>
            `,
            profile: () => `
                <div class="card-premium" style="text-align:center; align-items:center;">
                    <div style="width:60px; height:60px; background:var(--primary); color:#000; font-weight:800; font-size:22px; border-radius:50%; display:flex; justify-content:center; align-items:center;">U</div>
                    <h4 style="margin-top:10px;">Membro Autenticado</h4>
                    <span style="font-size:10px; background:rgba(255,157,0,0.15); color:var(--primary); padding:2px 8px; border-radius:6px; font-weight:700; margin-top:4px;">Nível ${CoreEngine.Data.nivel}</span>
                </div>
                <button class="btn-premium" style="background:var(--bg-card); border:1px solid var(--border); color:var(--danger);" onclick="Supabase.auth.signOut()">Destruir Sessão (Logout)</button>
            `
        };

        // Boot
        CoreEngine.Init();
    </script>
</body>
</html>
