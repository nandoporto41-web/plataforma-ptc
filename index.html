<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium PTC | Painel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .nav-active { color: #22c55e !important; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <section id="auth-screen" class="flex-grow flex flex-col justify-center p-6 space-y-4 max-w-md mx-auto w-full">
        <h2 class="text-white text-2xl font-bold text-center mb-4">Premium PTC 💎</h2>
        <input type="email" id="email" placeholder="Seu E-mail" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white">
        <input type="password" id="password" placeholder="Sua Senha" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white">
        <button onclick="signIn()" class="w-full bg-emerald-500 py-4 rounded-xl font-bold text-black">Entrar</button>
        <button onclick="signUp()" class="w-full border border-slate-700 py-4 rounded-xl text-white">Criar Conta</button>
    </section>

    <div id="dashboard" class="hidden flex flex-col min-h-screen">
        <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-40 text-center font-bold">Premium PTC 💎</header>
        
        <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4">
            <section id="aba-inicio" class="space-y-4">
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl text-center">
                    <p class="text-slate-400 text-xs uppercase tracking-widest">Saldo Disponível</p>
                    <h2 id="txt-saldo" class="text-4xl font-black text-emerald-400 my-2">R$ 0.0000</h2>
                    <p class="text-slate-500 text-xs">Tarefas concluídas: <b id="txt-tarefas" class="text-white">0</b></p>
                </div>
            </section>

            <section id="aba-anuncios" class="space-y-4 hidden">
                <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 flex justify-between items-center">
                    <div><h4 class="font-bold">Anúncio Premium</h4><p class="text-xs text-emerald-400">+R$ 0.1500</p></div>
                    <button onclick="startAd(0.1500, 15)" class="bg-emerald-500 px-6 py-2 rounded-xl font-bold text-sm text-black">Ver</button>
                </div>
            </section>

            <section id="aba-sacar" class="space-y-4 hidden">
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-4">
                    <h3 class="font-bold text-lg text-sky-400">Sacar via Pix</h3>
                    <input type="number" id="valor-saque" placeholder="Valor (mín. R$ 10)" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm">
                    <input type="text" id="chave-pix" placeholder="Sua chave Pix" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm">
                    <button onclick="requestWithdrawal()" class="w-full bg-sky-500 py-3 rounded-xl font-bold text-black">Solicitar Saque</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 p-3 flex justify-around">
            <button onclick="changeTab('inicio')" class="text-xs text-slate-400">Início</button>
            <button onclick="changeTab('anuncios')" class="text-xs text-slate-400">Anúncios</button>
            <button onclick="changeTab('sacar')" class="text-xs text-slate-400">Sacar</button>
        </nav>
    </div>

    <div id="timer-overlay" class="fixed inset-0 bg-slate-950/95 z-50 hidden flex flex-col items-center justify-center p-6 text-center">
        <div id="countdown" class="text-6xl font-black text-emerald-400 mb-4">15</div>
        <div id="btn-container" class="hidden"><button onclick="finishAd()" class="bg-white text-black px-10 py-3 rounded-full font-bold">Coletar Recompensa</button></div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://hvivrmdygytttdlapjbi.supabase.co", "sb_publishable_mxIGnK-spI1ne3h-JYu4WQ_fqj1_dBM");
        let userData = { saldo: 0, tarefas: 0 };
        let activeReward = 0;
        let userId = null;

        async function loadUserData() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return;
            userId = user.id;
            let { data } = await _supabase.from('usuarios_ptc').select('*').eq('id', userId).single();
            if (data) { userData = data; updateUI(); }
        }

        async function signUp() {
            const { error } = await _supabase.auth.signUp({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            if (error) alert(error.message); else alert("Confirme seu e-mail!");
        }

        async function signIn() {
            const { error } = await _supabase.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            if (error) alert("Erro: " + error.message); else location.reload();
        }

        function updateUI() {
            document.getElementById('txt-saldo').innerText = `R$ ${parseFloat(userData.saldo).toFixed(4)}`;
            document.getElementById('txt-tarefas').innerText = userData.tarefas;
        }

        function changeTab(tab) {
            ['inicio', 'anuncios', 'sacar'].forEach(t => document.getElementById(`aba-${t}`).classList.add('hidden'));
            document.getElementById(`aba-${tab}`).classList.remove('hidden');
        }

        function startAd(reward, duration) {
            activeReward = reward;
            window.open("https://omg10.com/4/11216881", "_blank");
            document.getElementById('timer-overlay').classList.remove('hidden');
            let timeLeft = duration;
            document.getElementById('countdown').innerText = timeLeft;
            document.getElementById('btn-container').classList.add('hidden');
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timer); document.getElementById('btn-container').classList.remove('hidden'); }
            }, 1000);
        }

        async function finishAd() {
            userData.saldo += activeReward;
            userData.tarefas += 1;
            updateUI();
            await _supabase.from('usuarios_ptc').upsert({ id: userId, saldo: userData.saldo, tarefas: userData.tarefas });
            document.getElementById('timer-overlay').classList.add('hidden');
        }

        _supabase.auth.onAuthStateChange((event, session) => {
            if (session) { document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden'); loadUserData(); }
        });
    </script>
</body>
</html>
