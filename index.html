    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;

        }

        /* Container Principal estilo TikTok */
        .tiktok-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Player de Vídeo Proporção Vertical de Shorts */
        .video-box {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Barra Lateral de Botões Estilo TikTok */
        .side-bar {
            position: absolute;
            right: 15px;
            bottom: 12%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }

        .btn-next {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #fe2c55; /* Cor vermelha do TikTok */
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(254, 44, 85, 0.4);
            transition: transform 0.1s ease;
        }

        .btn-next:active {
            transform: scale(0.9);
        }

        .btn-label {
            font-size: 11px;
            color: #fff;
            margin-top: 5px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,1);
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- Script Monetag 2 (Tag Principal de Cliques/Popunder) -->

    <div class="tiktok-container">
        <!-- Player tela cheia -->
        <div class="video-box">
            <iframe id="videoPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <!-- Botão Avançar Flutuante na Lateral -->

            <div class="action-item">
                <button class="btn-next" onclick="carregarProximoVideo()">⏭️</button>

    </div>

    <script>
        // Configuração do Supabase com as suas credenciais oficiais
        const supabaseUrl = 'https://hvivrmdygytttdlapjbi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODc4NDMsImV4cCI6MjA5ODI2Mzg0M30.7tEyMfCreAwn7e2zikqWtdErjEHCL-la4-RzPxN1Twg'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Backup de segurança com os IDs dos seus 9 vídeos criativos
        const videosLocais = [
            'O4PWcIGL2SQ', // Motoboy
            'SlwT1NL6NMs', // Memes Tente não rir 119
            '08nzHfJZlzY', // Memes Ratoeira
            'l8aIEEA3i0g', // Cachorro dançando
            'nkY5znKeKzE', // Chute na garrafa
            'P40Kl10pmQM', // Neymar
            'iiQyHa5osjI', // Animação Vivian
            '3LJJYgvXq58', // Memes sono
            '6cLJ6E7504Q'  // Dogesh protein
        ];

        let ultimoIndice = -1;

        // Função para extrair apenas o ID puro do vídeo, mesmo se for inserido um link completo no banco
        function extrairVideoID(url) {
            if (!url) return '';
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|shorts\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : url;
        }

        async function carregarProximoVideo() {
            let videoId = '';

            try {
                // Tenta buscar direto do seu banco de dados Supabase
                const { data, error } = await _supabase.from('videos_virais').select('url_video');
                
                if (data && data.length > 0) {
                    let random = Math.floor(Math.random() * data.length);
                    videoId = extrairVideoID(data[random].url_video);
                } else {
                    // Se o banco estiver vazio, usa a lista local de segurança
                    videoId = obterVideoLocalAleatorio();
                }
            } catch (e) {
                // Caso ocorra qualquer falha de autenticação/rede, usa os locais
                videoId = obterVideoLocalAleatorio();
            }

            // Altera o SRC do iframe convertendo para o formato embed que funciona sem tela preta
            document.getElementById('videoPlayer').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0&mute=0`;
        }

        function obterVideoLocalAleatorio() {
            let novoIndice;
            do {
                novoIndice = Math.floor(Math.random() * videosLocais.length);
            } while (novoIndice === ultimoIndice && videosLocais.length > 1);
            
            ultimoIndice = novoIndice;
            return videosLocais[novoIndice];
        }

        // Inicia o feed tocando o primeiro vídeo assim que entra no site
        carregarProximoVideo();
    </script>
