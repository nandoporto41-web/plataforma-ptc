    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            background: #000;

            font-family: 'Poppins', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;

        .tiktok-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #000;

            border-radius: 50px;

        .logo-text {
            font-weight: 800;

            background: linear-gradient(90deg, #25f4ee, #fe2c55);

            -webkit-text-fill-color: transparent;

        .score-box {
            display: flex;
            align-items: center;
            gap: 6px;

            border-radius: 20px;
            color: #000;
            font-weight: 800;
            font-size: 13px;
        }

        /* Player de Vídeo */
        .video-box {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Menu Lateral Drawer */
        .menu-drawer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 80%;
            height: 100%;
            background: rgba(15, 15, 15, 0.98);
            border-right: 2px solid #25f4ee;
            z-index: 40;
            transition: left 0.3s ease;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            backdrop-filter: blur(15px);

        .menu-drawer.active { left: 0; }

        .menu-drawer h2 {
            font-size: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            color: #25f4ee;

        .data-card {

            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .data-card p { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .data-card span { font-size: 18px; font-weight: 700; color: #fff; }

        .close-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            color: #fe2c55;
            cursor: pointer;
        }

        /* Descrição VISÍVEL estilo TikTok no fundo do vídeo */
        .video-footer {
            position: absolute;
            bottom: 40px;
            left: 15px;
            right: 85px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 10px;
            backdrop-filter: blur(4px);
            border-left: 3px solid #25f4ee;

        .video-footer h3 {

            color: #25f4ee;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .video-footer p {
            font-size: 12px;
            color: #ffffff;
            line-height: 1.4;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Controles Flutuantes da Direita */
        .side-bar {
            position: absolute;
            right: 12px;
            bottom: 12%;
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
            z-index: 10;

        .circle-btn {
            width: 50px;

            border-radius: 50%;
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);

        .circle-btn.btn-next {

            border: none;
            box-shadow: 0 0 15px rgba(254, 44, 85, 0.5);
        }

        .circle-btn:active { transform: scale(0.85); }
        .btn-label { font-size: 11px; color: #fff; margin-top: 4px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
        .action-item { display: flex; flex-direction: column; align-items: center; }

        .floating-points {

            font-weight: 900;
            font-size: 26px;
            text-shadow: 0 0 8px #000;
            animation: floatUp 0.9s ease-out forwards;
            z-index: 30;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-90px) scale(1.4); opacity: 0; }
        }
    </style>

    <script>
        const supabaseUrl = 'https://hvivrmdygytttdlapjbi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODc4NDMsImV4cCI6MjA5ODI2Mzg0M30.7tEyMfCreAwn7e2zikqWtdErjEHCL-la4-RzPxN1Twg'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const videosLocais = ['O4PWcIGL2SQ', 'SlwT1NL6NMs', '08nzHfJZlzY', 'l8aIEEA3i0g', 'nkY5znKeKzE', 'P40Kl10pmQM', 'iiQyHa5osjI', '3LJJYgvXq58', '6cLJ6E7504Q'];
        let ultimoIndice = -1;
        let player;
        let videoAtualCompleto = false;

        let carteira = {
            videos: parseInt(localStorage.getItem('wallet_videos')) || 0,
            bonus: parseInt(localStorage.getItem('wallet_bonus')) || 0
        };

        function atualizarInterfaceMoedas() {
            let total = carteira.videos + carteira.bonus;
            document.getElementById('pointsBalance').innerText = total;
            document.getElementById('ptsVideos').innerText = carteira.videos;
            document.getElementById('ptsBonus').innerText = carteira.bonus;
            document.getElementById('ptsTotal').innerText = total;
        }

        function toggleMenu() {
            document.getElementById('menuDrawer').classList.toggle('active');
        }

        function extrairVideoID(url) {
            if (!url) return '';
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|shorts\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : url;
        }

        // Inicializa a API do Player do YouTube
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('videoPlayer', {
                height: '100%',
                width: '100%',
                videoId: videosLocais[0],
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'iv_load_policy': 3,
                    'playsinline': 1
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // Monitor do estado do vídeo (Deteta quando chega ao FIM)
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                if (!videoAtualCompleto) {
                    videoAtualCompleto = true;
                    carteira.videos += 10;
                    localStorage.setItem('wallet_videos', carteira.videos);
                    atualizarInterfaceMoedas();
                    showFloatingPointsAnimation('+10 Pts');
                    
                    // Atualiza a descrição avisando que ganhou
                    document.getElementById('videoDesc').innerText = "Parabéns! Ganhou +10 PTS por assistir a este vídeo completo! 🎉";
                }
            }
        }

        async function carregarProximoVideo() {
            videoAtualCompleto = false; // Reseta a trava de segurança para o novo vídeo
            let videoId = '';

            try {
                const { data } = await _supabase.from('videos_virais').select('url_video');
                if (data && data.length > 0) {
                    let random = Math.floor(Math.random() * data.length);
                    videoId = extrairVideoID(data[random].url_video);
                } else {
                    videoId = obterVideoLocalAleatorio();
                }
            } catch (e) {
                videoId = obterVideoLocalAleatorio();
            }

            // Altera o vídeo usando a API nativa
            if (player && player.loadVideoById) {
                player.loadVideoById({videoId: videoId});
            }

            // Atualiza dinamicamente as legendas e contadores
            document.getElementById('videoDesc').innerText = "Assista a este vídeo até ao fim para validar e ganhar os seus pontos! 🚀 #viral #shorts #fyp";
            document.getElementById('likeCount').innerText = (Math.random() * 40 + 10).toFixed(1) + 'K';
            atualizarInterfaceMoedas();
        }

        function obterVideoLocalAleatorio() {
            let novoIndice;
            do {
                novoIndice = Math.floor(Math.random() * videosLocais.length);
            } while (novoIndice === ultimoIndice && videosLocais.length > 1);
            ultimoIndice = novoIndice;
            return videosLocais[novoIndice];
        }

        async function executarCompartilhamento() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'ViralRewards',
                        text: 'Assista a vídeos curtos e junte pontos!',
                        url: window.location.href
                    });
                    carteira.bonus += 50;
                    localStorage.setItem('wallet_bonus', carteira.bonus);
                    atualizarInterfaceMoedas();
                    showFloatingPointsAnimation('+50 Bônus');
                } catch (err) {
                    console.log('Cancelado.');
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                carteira.bonus += 50;
                localStorage.setItem('wallet_bonus', carteira.bonus);
                atualizarInterfaceMoedas();
                showFloatingPointsAnimation('+50 Copiado');
            }
        }

        function toggleLike(element) {
            let icon = element.querySelector('i');
            if(icon.style.color === 'rgb(254, 44, 85)') {
                icon.style.color = '#fff';
            } else {
                icon.style.color = '#fe2c55';
            }
        }

        function showFloatingPointsAnimation(text) {
            const container = document.getElementById('mainContainer');
            const el = document.createElement('div');
            el.className = 'floating-points';
            el.innerText = text;
            el.style.left = '45%';
            el.style.top = '45%';
            container.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        // Executa a inicialização de interface
        atualizarInterfaceMoedas();
    </script>
</body>
