<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos Virais</title>
    <!-- Inclui o Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        .video-container { height: 90vh; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; }
        .ad-banner { height: 10vh; background: #222; text-align: center; padding-top: 10px; }
    </style>
</head>
<body>

    <!-- Espaço para anúncio Monetag (Topo) -->
    <div class="ad-banner"> [INSIRA AQUI O CÓDIGO DA MONETAG] </div>

    <div class="video-container" id="player">
        <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        const supabase = supabase.createClient('SUA_URL_SUPABASE', 'SUA_CHAVE_ANON');

        async function carregarVideo() {
            const { data, error } = await supabase.from('videos_virais').select('*').limit(1);
            if (data) {
                document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${data[0].url_video}`;
            }
        }
        carregarVideo();
    </script>
</body>
</html>
