<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineRewards Premium Pro — Dashboard de Ganhos</title>
    
    <!-- CDNs de Alta Performance -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        :root {
            --bg-main: #06060c;
            --bg-surface: #0c0d14;
            --bg-card: #131522;
            --primary: #ff9d00;
            --secondary: #ffbe1a;
            --success: #10b981;
            --danger: #f43f5e;
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
            --border: rgba(255, 255, 255, 0.04);
            --glass: rgba(12, 13, 20, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }

        .app-shell {
            width: 100%;
            max-width: 480px;
            background: var(--bg-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            padding-bottom: 90px;
        }

        /* Toast Profissional */
        .toast-system {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%);
            width: calc(100% - 40px); max-width: 440px; background: var(--bg-card);
            border: 1px solid var(--border); padding: 14px 18px; border-radius: 14px;
            z-index: 5000; backdrop-filter: blur(20px); font-size: 13px; display: flex; align-items: center; gap: 12px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast-system.active { transform: translateX(-50%) translateY(0); }
        .toast-system.success { border-color: var(--success); color: var(--success); }
        .toast-system.danger { border-color: var(--danger); color: var(--danger); }

        /* Global Header */
        .app-header {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); sticky: top; top: 0; z-index: 1000;
        }
        .app-header .logo-area h1 { font-size: 18px; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-header .logo-area p { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Media Player Box */
        .video-viewport { width: 100%; height: 260px; background: #000; position: relative; }
        #ytPlayerFrame { width: 100%; height: 100%; border: none; }

        /* Main Container */
        .content-body { padding: 20px; display: flex; flex-direction: column; gap: 24px; }

        /* Grid Estatísticas Financeiras */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; position: relative; overflow: hidden; }
        .stat-card p { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
        .stat-card h3 { font-size: 20px; font-weight: 800; color: #fff; }
        .stat-card h3.green { color: var(--success); }
        .stat-badge { position: absolute; top: 12px; right: 12px; font-size: 12px; color: rgba(255,157,0,0.2); }

        /* Seções e Títulos */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-header h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .section-header h2 i { color: var(--primary); }

        /* Lista / Cards de Oportunidades */
        .opportunity-list { display: flex; flex-direction: column; gap: 10px; }
        .opportunity-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color 0.2s; }
        .opportunity-item:hover { border-color: rgba(255,157,0,0.3); }
        .opp-details { display: flex; align-items: center; gap: 14px; }
        .opp-icon { width: 40px; height: 40px; background: rgba(255,157,0,0.06); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 16px; }
        .opp-text h4 { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 2px; }
        .opp-text p { font-size: 11px; color: var(--text-muted); }
        .opp-payout { text-align: right; }
        .opp-payout span { display: block; font-size: 12px; font-weight: 700; color: var(--primary); }
        .opp-payout small { font-size: 9px; color: var(--success); text-transform: uppercase; font-weight: bold; }

        /* Grid de Vídeos do Catálogo */
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .video-card { background: var(--bg-card); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s; }
        .video-card.active { border-color: var(--primary); }
        .video-thumb { position: relative; width: 100%; height: 100px; background: #1a1c2e; }
        .video-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .video-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.75); padding: 2px 6px; border-radius: 4px; font-size: 9px; color: var(--primary); font-weight: 700; }
        .video-meta { padding: 10px; }
        .video-meta h4 { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-meta p { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        /* Box de Saque Estruturado */
        .payout-box { background: linear-gradient(135deg, #131522, #181126); border: 1px solid var(--border); border-radius: 18px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .input-wrapper { display: flex; flex-direction: column; gap: 6px; }
        .input-wrapper label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .premium-input { background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: #fff; font-size: 13px; outline: none; }
        .premium-input:focus { border-color: var(--primary); }
        .btn-action { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; font-weight: 700; font-size: 13px; border: none; padding: 14px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(255,157,0,0.2); }

        /* Sistema de Afiliados */
        .referral-box { background: rgba(255,157,0,0.03); border: 1px dashed rgba(255,157,0,0.2); border-radius: 14px; padding: 14px; }
        .referral-link-row { display: flex; gap: 8px; margin-top: 8px; }
        .referral-link-row input { flex: 1; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px; color: var(--text-muted); font-size: 11px; outline: none; }

        /* Bottom Menu */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 75px; background: linear-gradient(to top, #06060c 70%, transparent); padding: 0 16px; display: flex; align-items: center; z-index: 2000; }
        .dock-bar { width: 100%; height: 54px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 18px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -5px 25px rgba(0,0,0,0.6); }
        .dock-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--text-muted); width: 55px; }
        .dock-item.active { color: var(--primary); }
        .dock-item i { font-size: 14px; }
        .dock-item span { font-size: 10px; font-weight: 600; }

        /* Auth Canvas Gate */
        .auth-gate { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 100vh; background: var(--bg-main); z-index: 9000; display: flex; flex-direction: column; padding: 40px 24px; justify-content: center; }
        .auth-gate.hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- Toast System Message -->
        <div class="toast-system" id="globalToast">
            <i class="fa-solid fa-circle-check"></i>
            <span id="globalToastText">Mensagem Administrativa</span>
        </div>

        <!-- Tela de Autenticação Segura -->
        <div class="auth-gate" id="authScreen">
            <div style="text-align: center; margin-bottom: 35px;">
                <h1 style="font-size: 34px; font-weight: 800; color: var(--primary); letter-spacing: -1px;">CineRewards</h1>
                <p style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Premium Monetization Hub</p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
                <input type="email" id="authEmail" class="premium-input" placeholder="Seu e-mail profissional">
                <input type="password" id="authPassword" class="premium-input" placeholder="Sua senha de segurança">
            </div>
            <button class="btn-action" onclick="AppEngine.Auth.submit()">Acessar Plataforma</button>
            <p id="authToggleBtn" style="text-align:center; font-size:12px; color:var(--primary); margin-top:20px; cursor:pointer;" onclick="AppEngine.Auth.toggle()">Novo por aqui? Crie uma conta</p>
        </div>

        <!-- App Header Bar -->
        <header class="app-header">
            <div class="logo-area">
                <h1>CINE REWARDS</h1>
                <p id="userRankLabel">NÍVEL BRONZE</p>
            </div>
            <div style="text-align: right;">
                <span style="font-size: 10px; color: var(--text-muted); display:block;">ID Usuário</span>
                <span id="userIdBadge" style="font-size: 11px; font-weight:700; color:#fff;">#0000</span>
            </div>
        </header>

        <!-- Dynamic YouTube Viewport View -->
        <div class="video-viewport">
            <div id="ytPlayerFrame"></div>
        </div>

        <!-- SPA Body Content -->
        <div class="content-body" id="spaContent">
            <!-- As visualizações serão injetadas dinamicamente via AppEngine.UI.render -->
        </div>

        <!-- Bottom Navigation Dock -->
        <nav class="bottom-nav">
            <div class="dock-bar">
                <div class="dock-item active" id="nav-dashboard" onclick="AppEngine.UI.switchTab('dashboard')">
                    <i class="fa-solid fa-chart-pie"></i><span>Painel</span>
                </div>
                <div class="dock-item" id="nav-cinema" onclick="AppEngine.UI.switchTab('cinema')">
                    <i class="fa-solid fa-clapperboard"></i><span>Cinema</span>
                </div>
                <div class="dock-item" id="nav-tasks" onclick="AppEngine.UI.switchTab('tasks')">
                    <i class="fa-solid fa-list-check"></i><span>Tarefas</span>
                </div>
                <div class="dock-item" id="nav-finance" onclick="AppEngine.UI.switchTab('finance')">
                    <i class="fa-solid fa-wallet"></i><span>Sacar</span>
                </div>
            </div>
        </nav>

    </div>

    <script>
        // Inicialização do Client Supabase Real
        const SupabaseClient = supabase.createClient(
            'https://hvivrmdygytttdlapjbi.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aXZybWR5Z3l0dHRkbGFwamJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODc4NDMsImV4cCI6MjA5ODI2Mzg0M30.7tEyMfCreAwn7e2zikqWtdErjEHCL-la4-RzPxN1Twg'
        );

        let signupMode = false;
        let playerInstance = null;
        let tickTimer = null;

        // Dados Fixos do Ecossistema Profissional
        const videoCatalog = [
            { id: 'ykxV5I2PQCE', titulo: 'O Maior Ladrão do Mundo', categoria: 'Suspense', pts: '+16 pts/min' },
            { id: 'KIZ5crgHkPY', titulo: 'Até que a Sorte nos Separe', categoria: 'Comédia', pts: '+16 pts/min' },
            { id: 'VwNAFqsxAVg', titulo: 'Sete Homens e um Destino', categoria: 'Ação', pts: '+16 pts/min' }
        ];

        const ptcAds = [
            { id: 1, title: 'Ganhar Criptomoedas Jogando', desc: 'Visite por 15 segundos e ganhe pontos', reward: '45 PTS', time: '15s' },
            { id: 2, title: 'Nova Carteira Digital MEI', desc: 'Veja a proposta da fintech parceira', reward: '60 PTS', time: '30s' }
        ];

        const AppEngine = {
            SessionUser: null,
            WalletData: { pontos: 0, saldo_reais: 0.00, nivel: 'Bronze' },
            CurrentVideoId: 'ykxV5I2PQCE',
            CurrentTab: 'dashboard',

            Init: function() {
                this.Auth.watch();
            },

            Auth: {
                toggle: function() {
                    signupMode = !signupMode;
                    document.getElementById('authToggleBtn').innerText = signupMode ? "Já tem conta? Faça Login" : "Novo por aqui? Crie uma conta";
                    document.querySelector('#authScreen .btn-action').innerText = signupMode ? "Criar Conta Real" : "Acessar Plataforma";
                },
                submit: async function() {
                    const e = document.getElementById('authEmail').value;
                    const p = document.getElementById('authPassword').value;
                    if(!e || !p) return;

                    if(signupMode) {
                        const { error } = await SupabaseClient.auth.signUp({ email: e, password: p });
                        if(error) AppEngine.UI.msg(error.message, 'danger');
                        else { AppEngine.UI.msg('Conta criada com sucesso! Faça login.', 'success'); this.toggle(); }
                    } else {
                        const { error } = await SupabaseClient.auth.signInWithPassword({ email: e, password: p });
                        if(error) AppEngine.UI.msg(error.message, 'danger');
                    }
                },
                watch: function() {
                    SupabaseClient.auth.onAuthStateChange(async (event, session) => {
                        if(session) {
                            AppEngine.SessionUser = session.user;
                            document.getElementById('authScreen').classList.add('hidden');
                            document.getElementById('userIdBadge').innerText = `#${session.user.id.slice(0,5).toUpperCase()}`;
                            await AppEngine.Backend.refresh();
                            AppEngine.UI.switchTab('dashboard');
                        } else {
                            AppEngine.SessionUser = null;
                            document.getElementById('authScreen').classList.remove('hidden');
                            clearInterval(tickTimer);
                        }
                    });
                }
            },

            Backend: {
                refresh: async function() {
                    if(!AppEngine.SessionUser) return;
                    const { data: wallet } = await SupabaseClient.from('wallets').select('*').eq('id', AppEngine.SessionUser.id).maybeSingle();
                    const { data: profile } = await SupabaseClient.from('profiles').select('*').eq('id', AppEngine.SessionUser.id).maybeSingle();

                    if(wallet) {
                        AppEngine.WalletData.pontos = wallet.pontos;
                        AppEngine.WalletData.saldo_reais = wallet.saldo_reais;
                    }
                    if(profile) {
                        AppEngine.WalletData.nivel = profile.nivel;
                        document.getElementById('userRankLabel').innerText = `NÍVEL ${profile.nivel.toUpperCase()}`;
                    }
                },
                triggerTick: async function() {
                    if(!AppEngine.SessionUser) return;
                    
                    const { data, error } = await SupabaseClient.rpc('registrar_tempo_assistido', {
                        p_video_id: AppEngine.CurrentVideoId,
                        p_fingerprint: 'client_v5_pro_secure'
                    });

                    if(!error && data) {
                        if(data.sucesso) {
                            AppEngine.WalletData.pontos = data.total_pontos;
                            AppEngine.WalletData.saldo_reais = data.total_reais;
                            AppEngine.UI.msg(`+${data.pontos_adicionados} Pontos auditados em Servidor.`, 'success');
                            if(AppEngine.CurrentTab === 'dashboard' || AppEngine.CurrentTab === 'finance') {
                                AppEngine.UI.switchTab(AppEngine.CurrentTab); 
                            }
                        } else {
                            AppEngine.UI.msg(data.erro, 'danger');
                        }
                    }
                }
            },

            UI: {
                msg: function(text, type = 'success') {
                    const t = document.getElementById('globalToast');
                    t.className = `toast-system ${type} active`;
                    document.getElementById('globalToastText').innerText = text;
                    setTimeout(() => t.classList.remove('active'), 3000);
                },
                switchTab: async function(tabName) {
                    AppEngine.CurrentTab = tabName;
                    document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
                    const targetDock = document.getElementById(`nav-${tabName}`);
                    if(targetDock) targetDock.classList.add('active');

                    await AppEngine.Backend.refresh();
                    const view = document.getElementById('spaContent');
                    
                    if(tabName === 'dashboard') {
                        view.innerHTML = `
                            <!-- Painel Estatístico Real de Mercado -->
                            <div class="stats-grid">
                                <div class="stat-card">
                                    <p>Balanço Estável</p>
                                    <h3>${AppEngine.WalletData.pontos} <span style="font-size:11px; color:var(--primary)">PTS</span></h3>
                                    <i class="fa-solid fa-coins stat-badge"></i>
                                </div>
                                <div class="stat-card">
                                    <p>Saldo Convertido</p>
                                    <h3 class="green">${parseFloat(AppEngine.WalletData.saldo_reais).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</h3>
                                    <i class="fa-solid fa-money-bill-trend-up stat-badge"></i>
                                </div>
                            </div>

                            <!-- Oportunidades Rápidas -->
                            <div>
                                <div class="section-header">
                                    <h2><i class="fa-solid fa-bolt"></i> Ganhos Rápidos</h2>
                                </div>
                                <div class="opportunity-list">
                                    <div class="opportunity-item" onclick="AppEngine.UI.switchTab('tasks')">
                                        <div class="opp-details">
                                            <div class="opp-icon"><i class="fa-solid fa-rectangle-ad"></i></div>
                                            <div class="opp-text">
                                                <h4>Visualizar Anúncios PTC</h4>
                                                <p>Anúncios disponíveis para clique hoje</p>
                                            </div>
                                        </div>
                                        <div class="opp-payout"><span>+105 PTS</span><small>Imediato</small></div>
                                    </div>
                                    <div class="opportunity-item">
                                        <div class="opp-details">
                                            <div class="opp-icon"><i class="fa-solid fa-layer-group"></i></div>
                                            <div class="opp-text">
                                                <h4>Mural de Ofertas (Offerwall)</h4>
                                                <p>Responda pesquisas corporativas</p>
                                            </div>
                                        </div>
                                        <div class="opp-payout"><span>+1.500 PTS</span><small>Auditoria</small></div>
                                    </div>
                                </div>
                            </div>

                            <!-- Convite de Afiliados -->
                            <div class="referral-box">
                                <h4 style="font-size:12px; font-weight:700; color:#fff;"><i class="fa-solid fa-users" style="color:var(--primary); margin-right:6px;"></i> Programa de Afiliados Pro</h4>
                                <p style="font-size:11px; color:var(--text-muted); margin-top:4px;">Receba 10% de comissão sobre todos os cliques e execuções de mídia dos seus indicados diretamente na sua Wallet.</p>
                                <div class="referral-link-row">
                                    <input type="text" readonly value="https://cinerewards-ptc.vercel.app/join?ref=${AppEngine.SessionUser ? AppEngine.SessionUser.id.slice(0,6) : 'user'}">
                                    <button style="padding:0 12px; background:var(--bg-card); border:1px solid var(--border); color:var(--primary); font-size:11px; border-radius:8px; cursor:pointer;" onclick="navigator.clipboard.writeText(this.previousElementSibling.value); AppEngine.UI.msg('Link copiado para a área de transferência!')">Copiar</button>
                                </div>
                            </div>
                        `;
                    } 
                    
                    else if(tabName === 'cinema') {
                        view.innerHTML = `
                            <div class="section-header">
                                <h2><i class="fa-solid fa-photo-film"></i> Catálogo de Transmissão Ativa</h2>
                            </div>
                            <div class="catalog-grid" id="catalogInjection"></div>
                        `;
                        const grid = document.getElementById('catalogInjection');
                        videoCatalog.forEach(v => {
                            const activeClass = v.id === AppEngine.CurrentVideoId ? 'active' : '';
                            const card = document.createElement('div');
                            card.className = `video-card ${activeClass}`;
                            card.onclick = () => {
                                AppEngine.CurrentVideoId = v.id;
                                if(playerInstance && playerInstance.loadVideoById) playerInstance.loadVideoById(v.id);
                                AppEngine.UI.switchTab('cinema');
                            };
                            card.innerHTML = `
                                <div class="video-thumb">
                                    <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=300" alt="Cover">
                                    <span class="video-badge">${v.pts}</span>
                                </div>
                                <div class="video-meta">
                                    <h4>${v.titulo}</h4>
                                    <p>${v.categoria}</p>
                                </div>
                            `;
                            grid.appendChild(card);
                        });
                    }

                    else if(tabName === 'tasks') {
                        view.innerHTML = `
                            <div class="section-header">
                                <h2><i class="fa-solid fa-bullseye"></i> Paid-To-Click (PTC Links)</h2>
                            </div>
                            <div class="opportunity-list">
                                ${ptcAds.map(ad => `
                                    <div class="opportunity-item" onclick="AppEngine.UI.msg('Aguarde o carregamento do anúncio por ${ad.time}...', 'success')">
                                        <div class="opp-details">
                                            <div class="opp-icon"><i class="fa-solid fa-arrow-pointer"></i></div>
                                            <div class="opp-text">
                                                <h4>${ad.title}</h4>
                                                <p>${ad.desc} • <b>Tempo: ${ad.time}</b></p>
                                            </div>
                                        </div>
                                        <div class="opp-payout"><span>${ad.reward}</span><small>PTC Link</small></div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }

                    else if(tabName === 'finance') {
                        view.innerHTML = `
                            <div class="payout-box">
                                <h3 style="font-size:14px; font-weight:700; color:#fff;"><i class="fa-solid fa-money-bill-transfer" style="color:var(--primary); margin-right:8px;"></i> Solicitar Liquidação de Saldo</h3>
                                <p style="font-size:11px; color:var(--text-muted);">As transferências passam por uma auditoria direta de concorrência antes do envio ao gateway de pagamento (PIX).</p>
                                
                                <div style="background:rgba(0,0,0,0.2); padding:12px; border-radius:10px; margin:5px 0;">
                                    <span style="font-size:10px; color:var(--text-muted); display:block; text-transform:uppercase;">Disponível Para Saque</span>
                                    <h2 style="color:var(--success); font-weight:800; font-size:24px;">${parseFloat(AppEngine.WalletData.saldo_reais).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</h2>
                                </div>

                                <div class="input-wrapper">
                                    <label>Tipo de Chave PIX</label>
                                    <select class="premium-input" style="background:var(--bg-main);">
                                        <option>CPF / CNPJ</option>
                                        <option>E-mail</option>
                                        <option>Telefone Celular</option>
                                    </select>
                                </div>

                                <div class="input-wrapper">
                                    <label>Dados do Favorecido (Sua Chave)</label>
                                    <input type="text" id="targetPixInput" class="premium-input" placeholder="Insira a sua chave pix aqui">
                                </div>

                                <button class="btn-action" onclick="AppEngine.UI.executeCashout()">Processar Retirada Imediata</button>
                            </div>
                        `;
                    }
                },
                executeCashout: async function() {
                    const key = document.getElementById('targetPixInput').value;
                    if(!key) { this.msg('Por favor, informe a sua chave PIX.', 'danger'); return; }
                    
                    if(AppEngine.WalletData.pontos < 200000) {
                        this.msg('Limite mínimo de faturamento corporativo não atingido (R$ 20,00 / 200k PTS).', 'danger');
                        return;
                    }

                    const { error } = await SupabaseClient.from('withdrawals').insert([{
                        user_id: AppEngine.SessionUser.id,
                        chave_pix: key,
                        valor: 20.00
                    }]);

                    if(!error) {
                        this.msg('Ordem de pagamento enviada para o ledger de concorrência.', 'success');
                        await AppEngine.Backend.refresh();
                        this.switchTab('finance');
                    }
                }
            }
        };

        // Manipulação da API IFrame do YouTube com Callbacks Seguros
        function onYouTubeIframeAPIReady() {
            playerInstance = new YT.Player('ytPlayerFrame', {
                videoId: AppEngine.CurrentVideoId,
                playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'modestbranding': 1, 'origin': window.location.origin },
                events: { 'onStateChange': (event) => {
                    if(event.data === YT.PlayerState.PLAYING) {
                        if(!tickTimer) {
                            // Envia pulsações atômicas de segurança a cada 30 segundos de reprodução física real
                            tickTimer = setInterval(() => { AppEngine.Backend.triggerTick(); }, 30000);
                        }
                    } else {
                        clearInterval(tickTimer);
                        tickTimer = null;
                    }
                }}
            });
        }

        // Execução do Boot do Ecossistema
        AppEngine.Init();
    </script>
</body>
</html>
